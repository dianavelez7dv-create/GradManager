*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Georgia,serif;background:#0a0a0f;color:#e8e0d0;min-height:100vh;}
.sc{display:none;padding:14px;padding-bottom:90px;}.sc.on{display:block;}
.hdr{background:#12121a;border-bottom:1px solid #2a2a3a;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#12121a;border-top:1px solid #1e1e28;display:flex;z-index:100;overflow-x:auto;scrollbar-width:none;}
.bnav::-webkit-scrollbar{display:none;}
.nb{flex:0 0 auto;padding:10px 12px;border:none;background:transparent;color:#555;font-family:Georgia,serif;font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:58px;border-top:2px solid transparent;}
.nb.on{color:#C9A84C;border-top-color:#C9A84C;}
.nb span:first-child{font-size:18px;}
.card{background:#12121a;border:1px solid #C9A84C30;border-radius:12px;padding:14px;margin-bottom:12px;}
.ct{font-size:10px;letter-spacing:3px;color:#C9A84C;text-transform:uppercase;margin-bottom:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.sb{background:#0d0d16;border-radius:10px;padding:12px;text-align:center;border:1px solid #2a2a3a;}
.sv{font-size:20px;font-weight:bold;margin-bottom:3px;}
.sl{font-size:10px;color:#666;}
.btn{display:inline-block;padding:9px 16px;border-radius:8px;border:1px solid #C9A84C;background:#C9A84C20;color:#C9A84C;font-family:Georgia,serif;font-size:13px;cursor:pointer;text-align:center;}
.bw{width:100%;display:block;}
.bs{padding:6px 12px;font-size:12px;}
.bg{border-color:#4CC97A!important;background:#4CC97A20!important;color:#4CC97A!important;}
.br{border-color:#C94C7A!important;background:#C94C7A20!important;color:#C94C7A!important;}
.bb{border-color:#4CA8C9!important;background:#4CA8C920!important;color:#4CA8C9!important;}
.bp{border-color:#7C6CD4!important;background:#7C6CD420!important;color:#7C6CD4!important;}
.inp{width:100%;background:#0d0d16;border:1px solid #2a2a3a;border-radius:8px;padding:10px 12px;color:#ddd;font-family:Georgia,serif;font-size:13px;outline:none;margin-bottom:10px;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
textarea.inp{min-height:68px;resize:vertical;}
select.inp{appearance:none;}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.pb{height:6px;background:#1e1e28;border-radius:3px;overflow:hidden;margin:4px 0;}
.pf{height:100%;border-radius:3px;transition:width .4s;}
.li{padding:10px 0;border-bottom:1px solid #1e1e28;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.li:last-child{border-bottom:none;}
.it{font-size:14px;color:#ddd;margin-bottom:3px;}
.is{font-size:11px;color:#666;}
.dv{height:1px;background:#1e1e28;margin:12px 0;}
.chip{display:inline-block;padding:7px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #333;color:#666;background:transparent;font-family:Georgia,serif;margin:3px;}
.chip.on{border-color:#C9A84C;color:#C9A84C;background:#C9A84C20;}
#lgs{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.mov{display:none;position:fixed;inset:0;background:#000b;z-index:500;align-items:flex-end;justify-content:center;}
.mov.on{display:flex;}
.mob{background:#12121a;border:1px solid #C9A84C40;border-radius:14px 14px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:18px;}
.moh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.mot{font-size:15px;color:#ddd;}
.moc{background:none;border:none;color:#555;font-size:22px;cursor:pointer;}
#sbar{position:fixed;top:0;left:0;right:0;background:#4CC97A;color:#000;font-size:12px;text-align:center;padding:6px;z-index:999;display:none;font-family:Georgia,serif;font-weight:bold;}

// Prevent form submission on Enter globally
document.addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    var active=document.activeElement;
    if(active&&(active.tagName==="INPUT"||active.tagName==="TEXTAREA")){
      // Only prevent if we're in student screens
      var estScreen=document.getElementById("est-login-screen");
      var regScreen=document.getElementById("reg-screen");
      var licScreen=document.getElementById("license-screen");
      if((estScreen&&estScreen.style.display!=="none")||
         (regScreen&&regScreen.style.display!=="none")||
         (licScreen&&licScreen.style.display!=="none")){
        e.preventDefault();
      }
    }
  }
});

function validateLicense(codigo, email){
  return new Promise(function(resolve){
    try{
      var url=SUPA_URL+"/rest/v1/licencias?codigo=eq."+encodeURIComponent(codigo)+"&email=eq."+encodeURIComponent(email)+"&select=*&apikey="+SUPA_KEY;
      var xhr=new XMLHttpRequest();
      xhr.open("GET", url, true);
      xhr.setRequestHeader("apikey", SUPA_KEY);
      xhr.setRequestHeader("Authorization", "Bearer "+SUPA_KEY);
      xhr.onreadystatechange=function(){
        if(xhr.readyState===4){
          if(xhr.status===200){
            try{
              var data=JSON.parse(xhr.responseText);
              if(!data||!data.length){resolve({valid:false,error:"Codigo o correo invalido"});return;}
              var lic=data[0];
              if(!lic.activa){resolve({valid:false,error:"Licencia inactiva"});return;}
              var venc=new Date(lic.fecha_vencimiento);
              if(venc<new Date()){resolve({valid:false,error:"Licencia vencida el "+lic.fecha_vencimiento.split("T")[0]});return;}
              resolve({valid:true,licencia:lic});
            }catch(e){resolve({valid:false,error:"Error al leer respuesta"});}
          } else {
            resolve({valid:false,error:"Error "+xhr.status+": "+xhr.statusText});
          }
        }
      };
      xhr.onerror=function(){resolve({valid:false,error:"Error de red. Verifica tu conexion."});};
      xhr.ontimeout=function(){resolve({valid:false,error:"Tiempo de espera agotado."});};
      xhr.timeout=10000;
      xhr.send();
    }catch(e){
      resolve({valid:false,error:"Error: "+e.message});
    }
  });
}

  }
  return true;
}

// ENCRIPTACION DE DATOS (XOR + Base64)
// ══════════════════════════════════════
var _EK = "GradManager2025DefaultKey";

function setEncryptKey(licCode){
  _EK = "GM_" + licCode + "_2025_sec_key_gradmanager";
}

function xorEncrypt(str, key){
  var result = "";
  for(var i=0;i<str.length;i++){
    result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return result;
}

function encryptData(data){
  try{
    var json = JSON.stringify(data);
    var xored = xorEncrypt(json, _EK);
    return btoa(unescape(encodeURIComponent(xored)));
  }catch(e){
    return JSON.stringify(data);
  }
}

function decryptData(encrypted){
  try{
    // Try decryption first
    var decoded = decodeURIComponent(escape(atob(encrypted)));
    var decrypted = xorEncrypt(decoded, _EK);
    return JSON.parse(decrypted);
  }catch(e){
    // Backwards compatibility - plain JSON
    try{ return JSON.parse(encrypted); }catch(e2){ return {}; }
  }
}

function getMyStudent(){

  var sts=gST();
  // Try by studentPortalId (set when admin approves)
  if(CU.studentId){
    var mine=sts.find(function(s){
      return s.studentPortalId===CU.studentId||s.qr===CU.studentId;
    });
    if(mine) return mine;
  }
  // Try by carnet
  if(CU.carnet){
    var mine2=sts.find(function(s){return s.carnet===CU.carnet;});
    if(mine2) return mine2;
  }
  // Try by name (last resort)
  if(CU.name){
    var mine3=sts.find(function(s){
      return s.nombre&&s.nombre.toLowerCase()===CU.name.toLowerCase();
    });
    if(mine3) return mine3;
  }
  // Try by email
  if(CU.email){
    var mine4=sts.find(function(s){
      return s.email&&s.email.toLowerCase()===CU.email.toLowerCase();
    });
    if(mine4) return mine4;
  }
  // Try partial studentPortalId match (case insensitive)
  if(CU.studentId){
    var sid_lower=CU.studentId.toLowerCase();
    var mine5=sts.find(function(s){
      return s.studentPortalId&&s.studentPortalId.toLowerCase()===sid_lower;
    });
    if(mine5) return mine5;
  }
  return null;
}

function saveCambiarPassEst(){
  var oldP=document.getElementById("cp-old")?document.getElementById("cp-old").value:"";
  var newP=document.getElementById("cp-new")?document.getElementById("cp-new").value:"";
  var confP=document.getElementById("cp-conf")?document.getElementById("cp-conf").value:"";
  var err=document.getElementById("cp-err");
  if(!oldP||!newP||!confP){if(err){err.textContent="Completa todos los campos.";err.style.display="block";}return;}
  if(newP.length<6){if(err){err.textContent="La nueva contrasena debe tener al menos 6 caracteres.";err.style.display="block";}return;}
  if(newP!==confP){if(err){err.textContent="Las contrasenas no coinciden.";err.style.display="block";}return;}
  if(!CU||!CU.studentId){alert("Error: no se encontro tu ID.");return;}
  // Verify old password by checking against Supabase
  var oldHash=hashPassword(oldP);
  var newHash=hashPassword(newP);
  var xhr=new XMLHttpRequest();
  xhr.open("GET",SUPA_URL+"/rest/v1/registros_estudiantes?id_estudiante=eq."+encodeURIComponent(CU.studentId)+"&select=password_hash&apikey="+SUPA_KEY,true);
  xhr.setRequestHeader("apikey",SUPA_KEY);
  xhr.setRequestHeader("Authorization","Bearer "+SUPA_KEY);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4&&xhr.status===200){
      try{
        var data=JSON.parse(xhr.responseText);
        if(!data||!data.length){if(err){err.textContent="No se encontro tu cuenta.";err.style.display="block";}return;}
        if(data[0].password_hash!==oldHash){if(err){err.textContent="La contrasena actual es incorrecta.";err.style.display="block";}return;}
        // Update password
        var xhr2=new XMLHttpRequest();
        xhr2.open("PATCH",SUPA_URL+"/rest/v1/registros_estudiantes?id_estudiante=eq."+encodeURIComponent(CU.studentId)+"&apikey="+SUPA_KEY,true);
        xhr2.setRequestHeader("apikey",SUPA_KEY);
        xhr2.setRequestHeader("Authorization","Bearer "+SUPA_KEY);
        xhr2.setRequestHeader("Content-Type","application/json");
        xhr2.onreadystatechange=function(){
          if(xhr2.readyState===4){
            if(xhr2.status>=200&&xhr2.status<300){
              CM();
              alert("✅ Contrasena actualizada correctamente.");
            } else {
              if(err){err.textContent="Error al actualizar. Intenta de nuevo.";err.style.display="block";}
            }
          }
        };
        xhr2.send(JSON.stringify({password_hash:newHash}));
      }catch(e){if(err){err.textContent="Error de conexion.";err.style.display="block";}}
    }
  };
  xhr.send();
}

function generateStudentId(){
  // Generate secure unique ID: EST-XXXX-XXXX
  var chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  var p1="",p2="";
  for(var i=0;i<4;i++) p1+=chars[Math.floor(Math.random()*chars.length)];
  for(var i=0;i<4;i++) p2+=chars[Math.floor(Math.random()*chars.length)];
  return "EST-"+p1+"-"+p2;
}

function hashPassword(pass){
  // Simple but consistent hash
  var hash=5381;
  for(var i=0;i<pass.length;i++){
    hash=((hash<<5)+hash)+pass.charCodeAt(i);
    hash=hash>>>0; // unsigned 32-bit
  }
  return "h"+hash.toString(16)+pass.length.toString(16)+"x";
}

var _regLicencia=null;

function verificarCodigoReg(e){
  if(e&&e.preventDefault) e.preventDefault();
  var codigo=document.getElementById("reg-codigo")?document.getElementById("reg-codigo").value.trim().toUpperCase():"";
  if(!codigo){alert("Ingresa el codigo de registro.");return;}
  var btn=document.getElementById("reg-verify-btn");
  if(btn){btn.textContent="Verificando...";btn.disabled=true;}

  var xhr=new XMLHttpRequest();
  xhr.open("GET",SUPA_URL+"/rest/v1/licencias?codigo_registro=eq."+encodeURIComponent(codigo)+"&select=*&apikey="+SUPA_KEY,true);
  xhr.setRequestHeader("apikey",SUPA_KEY);
  xhr.setRequestHeader("Authorization","Bearer "+SUPA_KEY);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){
      if(btn){btn.textContent="Verificar codigo";btn.disabled=false;}
      if(xhr.status===200){
        try{
          var data=JSON.parse(xhr.responseText);
          if(!data||!data.length){
            alert("Codigo de registro invalido. Verifica con tu administrador.");
            return;
          }
          var lic=data[0];
          if(!lic.activa){alert("Esta licencia no esta activa.");return;}
          var venc=new Date(lic.fecha_vencimiento);
          if(venc<new Date()){alert("La licencia de tu escuela ha vencido.");return;}
          _regLicencia=lic;
          // Show form
          var form=document.getElementById("reg-form");
          if(form) form.style.display="block";
          var step1=document.getElementById("reg-codigo").parentNode;
          if(step1){
            step1.style.borderColor="#4CC97A40";
            var ok=document.createElement("div");
            ok.style.cssText="font-size:12px;color:#4CC97A;margin-top:8px;";
            ok.textContent="✓ Codigo verificado: "+lic.institucion;
            step1.appendChild(ok);
          }
        }catch(e){alert("Error al verificar.");}
      } else {
        alert("Error de conexion. Intenta de nuevo.");
      }
    }
  };
  xhr.send();
}

function submitRegistro(e){
  if(e&&e.preventDefault) e.preventDefault();
  if(!_regLicencia){alert("Primero verifica el codigo.");return;}
  var nombre=document.getElementById("reg-nombre")?document.getElementById("reg-nombre").value.trim():"";
  var ap1=document.getElementById("reg-ap1")?document.getElementById("reg-ap1").value.trim():"";
  var ap2=document.getElementById("reg-ap2")?document.getElementById("reg-ap2").value.trim():"";
  var carnet=document.getElementById("reg-carnet")?document.getElementById("reg-carnet").value.trim():"";
  var carrera=document.getElementById("reg-carrera")?document.getElementById("reg-carrera").value.trim():"";
  var tel=document.getElementById("reg-tel")?document.getElementById("reg-tel").value.trim():"";
  var email=document.getElementById("reg-email")?document.getElementById("reg-email").value.trim():"";
  var pass=document.getElementById("reg-pass")?document.getElementById("reg-pass").value:"";
  var pass2=document.getElementById("reg-pass2")?document.getElementById("reg-pass2").value:"";
  var err=document.getElementById("reg-err");
  var ok=document.getElementById("reg-ok");
  err.style.display="none";ok.style.display="none";

  if(!nombre||!ap1){err.textContent="Escribe tu nombre y primer apellido.";err.style.display="block";return;}
  if(!carnet){err.textContent="Escribe tu numero de carnet.";err.style.display="block";return;}
  if(!carrera){err.textContent="Escribe tu carrera.";err.style.display="block";return;}
  if(!pass||pass.length<6){err.textContent="La contrasena debe tener al menos 6 caracteres.";err.style.display="block";return;}
  if(pass!==pass2){err.textContent="Las contrasenas no coinciden.";err.style.display="block";return;}

  var fullName=nombre+" "+ap1+(ap2?" "+ap2:"");
  var studentId=generateStudentId();
  var passHash=hashPassword(pass);
  var btn=document.getElementById("reg-submit-btn");
  if(btn){btn.textContent="Registrando...";btn.disabled=true;}

  var payload={
    licencia_id:_regLicencia.id,
    codigo_licencia:_regLicencia.codigo,
    id_estudiante:studentId,
    nombre:fullName,
    carnet:carnet,
    carrera:carrera,
    telefono:tel,
    email:email,
    password_hash:passHash,
    aprobado:false
  };

  var xhr=new XMLHttpRequest();
  xhr.open("POST",SUPA_URL+"/rest/v1/registros_estudiantes?apikey="+SUPA_KEY,true);
  xhr.setRequestHeader("apikey",SUPA_KEY);
  xhr.setRequestHeader("Authorization","Bearer "+SUPA_KEY);
  xhr.setRequestHeader("Content-Type","application/json");
  xhr.setRequestHeader("Prefer","return=minimal");
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){
      if(btn){btn.disabled=false;}
      if(xhr.status>=200&&xhr.status<300){
        ok.innerHTML='<div style="font-size:14px;color:#4CC97A;font-weight:bold;margin-bottom:8px;">✅ Registro completado!</div>'
          +'<div style="font-size:13px;color:#ddd;margin-bottom:8px;">Tu ID de estudiante es:</div>'
          +'<div style="font-size:22px;color:#C9A84C;font-weight:bold;letter-spacing:3px;margin-bottom:8px;">'+studentId+'</div>'
          +'<div style="font-size:12px;color:#888;margin-bottom:12px;">Guarda este ID — lo necesitarás para entrar al sistema.</div>'
          +'<div style="font-size:12px;color:#C9A84C;">⏳ Tu acceso sera activado por el administrador.</div>';
        ok.style.display="block";
        if(btn) btn.style.display="none";
      } else if(xhr.status===409){
        err.textContent="Este carnet ya esta registrado.";err.style.display="block";
        if(btn) btn.textContent="✓ Completar Registro";
      } else {
        err.textContent="Error al registrar. Intenta de nuevo.";err.style.display="block";
        if(btn) btn.textContent="✓ Completar Registro";
      }
    }
  };
  xhr.send(JSON.stringify(payload));
}

// Student login with ID
function loginEstudiante(studentId, password){
  var passHash=hashPassword(password);
  function showEstErr(msg){
    var err=document.getElementById("est-err");
    if(err){err.textContent=msg;err.style.display="block";}
  }
  var xhr=new XMLHttpRequest();
  xhr.open("GET",SUPA_URL+"/rest/v1/registros_estudiantes?id_estudiante=eq."+encodeURIComponent(studentId)+"&select=*&apikey="+SUPA_KEY,true);
  xhr.setRequestHeader("apikey",SUPA_KEY);
  xhr.setRequestHeader("Authorization","Bearer "+SUPA_KEY);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){
      if(xhr.status===200){
        try{
          var data=JSON.parse(xhr.responseText);
          if(!data||!data.length){showEstErr("⚠ ID de estudiante no encontrado.");return;}
          var st=data[0];
          if(st.password_hash!==passHash){showEstErr("⚠ Contrasena incorrecta.");return;}
          if(!st.aprobado){showEstErr("⚠ Tu acceso aun no ha sido aprobado por el administrador.");return;}
          // Login as student - hide login screen first
          var estScreen=document.getElementById("est-login-screen");
          if(estScreen) estScreen.style.display="none";
          CU={
            id:st.id,name:st.nombre,email:st.email||st.id_estudiante,
            role:"estudiante",color:"#C94C7A",icon:"🎓",av:st.nombre.charAt(0),
            studentId:st.id_estudiante,carnet:st.carnet
          };
          D._user=CU;
          SD();
          document.getElementById("lgs").style.display="none";
          document.getElementById("app").style.display="block";
          applyTheme();
          go("dash");
        }catch(e){showEstErr("⚠ Error de conexion.");}
      } else {
        showEstErr("⚠ Error "+xhr.status+". Intenta de nuevo.");
      }
    }
  };
  xhr.send();
}

function aprobarRegistro(btn){
  var rid=btn.dataset.rid;
  var nombre=btn.dataset.nombre;
  var carnet=btn.dataset.carnet;
  var carrera=btn.dataset.carrera;
  var tel=btn.dataset.tel;
  var email=btn.dataset.email;
  var sid=btn.dataset.sid;
  
  // 1. Approve in Supabase
  var xhr=new XMLHttpRequest();
  xhr.open("PATCH",SUPA_URL+"/rest/v1/registros_estudiantes?id=eq."+rid+"&apikey="+SUPA_KEY,true);
  xhr.setRequestHeader("apikey",SUPA_KEY);
  xhr.setRequestHeader("Authorization","Bearer "+SUPA_KEY);
  xhr.setRequestHeader("Content-Type","application/json");
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4&&xhr.status>=200&&xhr.status<300){
      // 2. Add student to local D.students
      if(!D.students) D.students=[];
      var exists=D.students.find(function(s){return s.carnet===carnet||s.studentPortalId===sid;});
      if(!exists){
        D.students.push({
          id:Date.now(),nombre:nombre,carnet:carnet,carrera:carrera,
          tel:tel||"",email:email||"",gpa:0,parts:[],pagos:[],
          toga:{talla:"",ok:false},qr:sid,asis:[],foto:"",
          studentPortalId:sid
        });
        SD();
        addN("✅ "+nombre+" agregado a estudiantes");
      } else {
        // Update existing with portal ID
        exists.studentPortalId=sid;
        SD();
      }
      addN("✅ "+nombre+" aprobado");
      mRegistrosEstudiantes();
    }
  };
  xhr.send(JSON.stringify({aprobado:true}));
}

function rechazarRegistro(rid){
  confirmarAccion("Revocar acceso a este estudiante? Ya no podra entrar a la app.",function(){
    var xhr=new XMLHttpRequest();
    xhr.open("PATCH",SUPA_URL+"/rest/v1/registros_estudiantes?id=eq."+rid+"&apikey="+SUPA_KEY,true);
    xhr.setRequestHeader("apikey",SUPA_KEY);
    xhr.setRequestHeader("Authorization","Bearer "+SUPA_KEY);
    xhr.setRequestHeader("Content-Type","application/json");
    xhr.onreadystatechange=function(){
      if(xhr.readyState===4) mRegistrosEstudiantes();
    };
    xhr.send(JSON.stringify({aprobado:false}));
  });
}


function compressImage(file, maxSize, callback){
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement("canvas");
      var ratio=Math.min(maxSize/img.width, maxSize/img.height, 1);
      canvas.width=img.width*ratio;
      canvas.height=img.height*ratio;
      var ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      callback(canvas.toDataURL("image/jpeg",0.7));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function loadFotoPreview(input){
  if(!input.files||!input.files[0])return;
  var previewId=null;
  if(input.id==="nr-foto-inp") previewId="rifa-foto-prev";
  if(input.id==="si-foto-inp") previewId="sub-foto-prev";
  if(input.id==="vp-foto-inp") previewId="prod-foto-prev";
  if(input.id==="aim-foto-inp") previewId="aim-foto-prev";
  if(input.id==="np3-foto-inp") previewId="np3-foto-prev";
  if(!previewId){
    // Try to find preview by data-preview attribute or parent
    var parent=input.parentNode;
    if(parent){
      var prev=parent.querySelector("[id$='-foto-prev']");
      if(prev) previewId=prev.id;
    }
  }
  if(!previewId)return;
  compressImage(input.files[0],600,function(dataUrl){
    var prev=document.getElementById(previewId);
    if(prev){
      prev.innerHTML='<img src="'+dataUrl+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"/>';
      prev.style.padding="0";
    }
  });
}

var _currentFoto = {};

function setupFotoBtn(inputId, previewId){
  setTimeout(function(){
    var input = document.getElementById(inputId);

    if(!input || !prev) return;
    prev.onclick = function(){ input.click(); };
    input.onchange = function(){
      if(!this.files || !this.files[0]) return;
      var file = this.files[0];
      var reader = new FileReader();
      reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
          var canvas = document.createElement("canvas");
          var max = 600;
          var ratio = Math.min(max/img.width, max/img.height, 1);
          canvas.width = img.width * ratio;
          canvas.height = img.height * ratio;
          canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
          var dataUrl = canvas.toDataURL("image/jpeg", 0.75);
          _currentFoto[previewId] = dataUrl;
          prev.innerHTML = '<img src="'+dataUrl+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"/>';
          prev.style.padding = "0";
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };
  }, 300);
  // Retry after 600ms in case modal loads slow
  setTimeout(function(){
    var inp2=document.getElementById(inputId);
    var prv2=document.getElementById(previewId);
    if(inp2&&prv2&&!inp2._fotoSetup){
      prv2.onclick=function(){inp2.click();};
      inp2.onchange=function(){
        if(!this.files||!this.files[0])return;
        var file=this.files[0];
        var reader=new FileReader();
        reader.onload=function(e){
          var img=new Image();
          img.onload=function(){
            var canvas=document.createElement('canvas');
            var ratio=Math.min(600/img.width,600/img.height,1);
            canvas.width=img.width*ratio;canvas.height=img.height*ratio;
            canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
            var dataUrl=canvas.toDataURL('image/jpeg',0.75);
            _currentFoto[previewId]=dataUrl;
            var prev=document.getElementById(previewId);
            if(prev){prev.innerHTML='<img src="'+dataUrl+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"/>';prev.style.padding='0';}
          };
          img.src=e.target.result;
        };
        reader.readAsDataURL(file);
      };
      inp2._fotoSetup=true;
    }
  }, 600);
}

function marcarEntrega(sid,eid){
  var s=gST().find(function(x){return x.id===sid;});if(!s)return;
  // Check for pending balance
  var cat=gENT().find(function(e){return e.id===eid;})||{label:eid};
  var totalCosto=cT(s.parts);
  var totalPagado=cP(s.pagos||[]);
  var saldoTotal=totalCosto-totalPagado;
  // Debug: always show if there's any issue
  if(saldoTotal>0.01){
    if(!confirm("⚠️ ATENCION\n\n"+s.nombre+" debe "+fD(saldoTotal)+"\n\nTotal actividades: "+fD(totalCosto)+"\nTotal pagado: "+fD(totalPagado)+"\n\n¿Marcar entrega de '"+cat.label+"' de todas formas?")){
      return;

    if(!confirm("⚠️ Las actividades de "+s.nombre+" no tienen costo definido.\n\n¿Marcar entrega de todas formas?")){
      return;
    }
  }
  var now=new Date();
  var fecha=now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear();
  var entregadoPor=CU?CU.name:"Admin";
  D.students=gST().map(function(x){
    if(x.id!==sid)return x;

      if(e.id!==eid)return e;
      return Object.assign({},e,{entregado:true,fecha:fecha,entregadoPor:entregadoPor});
    });
    return Object.assign({},x,{entregas:entregas});
  });
  SD();
  addN("✅ Entrega registrada: "+eid+" para "+s.nombre);
  mEntregasDetalle(sid);

// Get amount paid for a specific activity label
function getPagoPorConcepto(pagos, concepto){
  return (pagos||[]).filter(function(p){return p.con===concepto;})
    .reduce(function(s,p){return s+p.monto;},0);
}

// Get pending balance for a specific activity
function getSaldoPorConcepto(pagos, parts, conceptoLabel){
  var part=gP().find(function(p){return p.label===conceptoLabel;});
  if(!part) return 0;
  var pagado=getPagoPorConcepto(pagos, conceptoLabel);
  return Math.max(0, part.costo - pagado);
}

// Check if student has paid for a specific entrega item
// Links entrega label to activity label
function entregaPagada(s, entregaLabel){
  if(!s||!s.parts||s.parts.length===0) return true; // no activities = allow
  // Find matching activity by label similarity
  var part=gP().find(function(p){
    return p.label.toLowerCase().indexOf(entregaLabel.toLowerCase())>=0 ||
           entregaLabel.toLowerCase().indexOf(p.label.toLowerCase())>=0;
  });
  if(!part) return true; // no matching activity = allow
  var saldo=getSaldoPorConcepto(s.pagos, s.parts, part.label);
  return saldo<=0;
}


function getFullName(s){
  if(!s) return "";
  var n=s.nombre||"";
  if(s.ap1) n+=" "+s.ap1;
  if(s.ap2) n+=" "+s.ap2;
  return n.trim();
}

var _recStudentId=null;

function enviarCodigoRecuperacion(){
  var email=document.getElementById("rec-email")?document.getElementById("rec-email").value.trim():"";
  if(!email){alert("Ingresa tu email.");return;}
  var msg=document.getElementById("rec-msg");
  if(msg){msg.textContent="Buscando...";msg.style.color="#888";}
  var xhr=new XMLHttpRequest();
  xhr.open("GET",SUPA_URL+"/rest/v1/registros_estudiantes?email=eq."+encodeURIComponent(email)+"&select=*&apikey="+SUPA_KEY,true);
  xhr.setRequestHeader("apikey",SUPA_KEY);xhr.setRequestHeader("Authorization","Bearer "+SUPA_KEY);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4&&xhr.status===200){
      var rows=[];try{rows=JSON.parse(xhr.responseText);}catch(e){}
      if(!rows.length){if(msg){msg.style.color="#C94C7A";msg.textContent="No se encontro cuenta con ese email.";}return;}
      _recStudentId=rows[0].id_estudiante;
      var code=Math.floor(100000+Math.random()*900000)+"";
      sessionStorage.setItem("rec_code",code);sessionStorage.setItem("rec_exp",Date.now()+600000);sessionStorage.setItem("rec_sid",_recStudentId||"");
      var ci=document.getElementById("rec-codigo"),ni=document.getElementById("rec-nueva"),cb=document.getElementById("rec-confirmar-btn");
      if(ci)ci.style.display="block";if(ni)ni.style.display="block";if(cb)cb.style.display="block";
      if(msg){msg.style.color="#4CC97A";msg.textContent="Codigo: "+code+" | Tu ID: "+rows[0].id_estudiante;}
    } else if(xhr.readyState===4){
      if(msg){msg.style.color="#C94C7A";msg.textContent="Error al buscar.";}
    }
  };xhr.send();
}
function confirmarNuevaPass(){
  var codigo=document.getElementById("rec-codigo")?document.getElementById("rec-codigo").value.trim():"";
  var nueva=document.getElementById("rec-nueva")?document.getElementById("rec-nueva").value:"";
  var msg=document.getElementById("rec-msg");
  if(!codigo||!nueva){alert("Completa los campos.");return;}
  if(nueva.length<6){alert("Minimo 6 caracteres.");return;}
  if(Date.now()>parseInt(sessionStorage.getItem("rec_exp")||"0")){if(msg){msg.style.color="#C94C7A";msg.textContent="Codigo expirado.";}return;}
  if(codigo!==sessionStorage.getItem("rec_code")){if(msg){msg.style.color="#C94C7A";msg.textContent="Codigo incorrecto.";}return;}
  var sid=sessionStorage.getItem("rec_sid")||_recStudentId;
  var xhr=new XMLHttpRequest();
  xhr.open("PATCH",SUPA_URL+"/rest/v1/registros_estudiantes?id_estudiante=eq."+encodeURIComponent(sid)+"&apikey="+SUPA_KEY,true);
  xhr.setRequestHeader("apikey",SUPA_KEY);xhr.setRequestHeader("Authorization","Bearer "+SUPA_KEY);
  xhr.setRequestHeader("Content-Type","application/json");xhr.setRequestHeader("Prefer","return=minimal");
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){
      if(xhr.status===200||xhr.status===204){
        sessionStorage.removeItem("rec_code");
        sessionStorage.removeItem("rec_exp");
        sessionStorage.removeItem("rec_sid");
        if(msg){msg.style.color="#4CC97A";msg.textContent="✓ Contrasena actualizada. Cerrando...";}
        setTimeout(function(){
          var recArea=document.getElementById("rec-area");
          if(recArea) recArea.style.display="none";
          // Clear input fields
          var ei=document.getElementById("est-id");var ep=document.getElementById("est-pass");
          if(ei) ei.value="";if(ep) ep.value="";
          var estErr=document.getElementById("est-err");
          if(estErr) estErr.style.display="none";
        },1500);
      } else {if(msg){msg.style.color="#C94C7A";msg.textContent="Error "+xhr.status+": No se pudo actualizar. Pide al admin que cambie tu clave.";}}
    }

// FIRMA DIGITAL
function oFirmaEntrega(sid,eid){
  var s=gST().find(function(x){return x.id===sid;});
  var cat=gENT().find(function(x){return x.id===eid;})||{label:eid,icon:"📦"};
  if(!s)return;
  // Check for pending balance
  var totalCosto=cT(s.parts);
  var totalPagado=cP(s.pagos||[]);
  var saldoTotal=totalCosto-totalPagado;
  if(saldoTotal>0.01){
    if(!confirm("⚠️ ATENCION: "+s.nombre+" tiene saldo pendiente de "+fD(saldoTotal)+"\n\n¿Deseas continuar con la entrega de todas formas?")){
      return;
    }
  }
  var html='<div class="moh"><span class="mot">✍️ Firma</span><button class="moc" onclick="CM()">✕</button></div>';
  html+='<div style="font-size:13px;color:#ddd;margin-bottom:8px;">'+s.nombre+' — '+cat.icon+' '+cat.label+'</div>';
  html+='<div style="background:#fff;border-radius:10px;margin-bottom:10px;"><canvas id="firma-canvas" width="320" height="150" style="width:100%;height:150px;border-radius:10px;touch-action:none;"></canvas></div>';
  html+='<div style="display:flex;gap:8px;">';
  html+='<button class="btn bs br" style="flex:1;" onclick="limpiarFirma()">🗑️ Limpiar</button>';
  html+='<button class="btn bs bg" style="flex:1;" data-sid="'+sid+'" data-eid="'+eid+'" onclick="guardarFirmaEntrega(parseInt(this.dataset.sid),this.dataset.eid)">✓ Confirmar</button>';
  html+='</div>';
  OM(html);
  setTimeout(function(){
    var canvas=document.getElementById("firma-canvas");if(!canvas)return;
    var ctx=canvas.getContext("2d");ctx.strokeStyle="#000";ctx.lineWidth=2;ctx.lineCap="round";
    var drawing=false,lx=0,ly=0;
    function gp(e){var r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height;return e.touches?{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy}:{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};}
    function st(e){e.preventDefault();drawing=true;var p=gp(e);lx=p.x;ly=p.y;}
    function dr(e){e.preventDefault();if(!drawing)return;var p=gp(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;}
    function sp(e){e.preventDefault();drawing=false;}
    canvas.addEventListener("mousedown",st);canvas.addEventListener("mousemove",dr);canvas.addEventListener("mouseup",sp);
    canvas.addEventListener("touchstart",st,{passive:false});canvas.addEventListener("touchmove",dr,{passive:false});canvas.addEventListener("touchend",sp,{passive:false});
  },100);
}
function limpiarFirma(){var c=document.getElementById("firma-canvas");if(c)c.getContext("2d").clearRect(0,0,c.width,c.height);}
function guardarFirmaEntrega(sid,eid){
  var canvas=document.getElementById("firma-canvas");
  if(!canvas){marcarEntrega(sid,eid);CM();return;}
  var d=canvas.getContext("2d").getImageData(0,0,canvas.width,canvas.height).data;
  var has=false;for(var i=3;i<d.length;i+=4){if(d[i]>0){has=true;break;}}
  if(!has){alert("Firma antes de confirmar.");return;}
  var firma=canvas.toDataURL("image/png");
  var now=new Date();var fecha=now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear();
  D.students=gST().map(function(x){
    if(x.id!==sid)return x;
    return Object.assign({},x,{entregas:(x.entregas||[]).map(function(e){
      if(e.id!==eid)return e;
      return{id:e.id,entregado:true,fecha:fecha,entregadoPor:CU?CU.name:"Admin",firma:firma};
    })});
  });
  SD();addN("📦 Entregado con firma");CM();mEntregasDetalle(sid);
}

function checkGradCelebration(){
  var gc=D.gradConfig||{};
  if(!gc.fechaEvento) return;
  var today=new Date();
  var parts=gc.fechaEvento.split("-");
  if(parts.length<3) return;
  var gradDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var isGradDay=today.getFullYear()===gradDate.getFullYear()&&
    today.getMonth()===gradDate.getMonth()&&
    today.getDate()===gradDate.getDate();
  if(isGradDay){
    var shown=sessionStorage.getItem("grad_celebrated");
    if(!shown){
      sessionStorage.setItem("grad_celebrated","1");
      setTimeout(function(){launchCelebration();},1000);
    }
  }
}

function launchCelebration(){
  // Create overlay
  var overlay=document.createElement("div");
  overlay.id="grad-celebration";
  overlay.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;pointer-events:none;overflow:hidden;";
  document.body.appendChild(overlay);

  // Launch confetti
  launchConfetti(overlay);

  // Launch fireworks
  launchFireworks(overlay);

  // Show message after 1 second
  setTimeout(function(){showGradMessage();},800);

  // Play celebration sound
  playCelebrationSound();

  // Remove overlay after 8 seconds
  setTimeout(function(){
    var el=document.getElementById("grad-celebration");
    if(el) el.remove();
  },8000);
}

function launchConfetti(container){
  var colors=["#C9A84C","#4CC97A","#C94C7A","#7C6CD4","#4CC9C9","#fff"];
  for(var i=0;i<150;i++){
    (function(i){
      setTimeout(function(){
        var c=document.createElement("div");
        var color=colors[Math.floor(Math.random()*colors.length)];
        var size=Math.random()*10+5;
        var startX=Math.random()*window.innerWidth;
        c.style.cssText="position:absolute;width:"+size+"px;height:"+size+"px;background:"+color+";top:-20px;left:"+startX+"px;border-radius:"+(Math.random()>0.5?"50%":"2px")+";opacity:1;transform:rotate("+Math.random()*360+"deg);";
        container.appendChild(c);
        var duration=Math.random()*3000+2000;
        var endY=window.innerHeight+50;
        var drift=(Math.random()-0.5)*200;
        var startTime=Date.now();
        function animate(){
          var elapsed=Date.now()-startTime;
          var progress=elapsed/duration;
          if(progress>=1){c.remove();return;}
          c.style.top=(progress*endY-20)+"px";
          c.style.left=(startX+drift*progress)+"px";
          c.style.opacity=(1-progress*0.5)+"";
          c.style.transform="rotate("+(progress*720)+"deg)";
          requestAnimationFrame(animate);
        }
        animate();
      },i*50);
    })(i);
  }
}

function launchFireworks(container){
  var colors=["#C9A84C","#4CC97A","#C94C7A","#7C6CD4","#fff","#4CC9C9"];
  for(var f=0;f<8;f++){
    (function(f){
      setTimeout(function(){
        var x=Math.random()*window.innerWidth;
        var y=Math.random()*window.innerHeight*0.6+50;
        for(var p=0;p<30;p++){
          var particle=document.createElement("div");
          var color=colors[Math.floor(Math.random()*colors.length)];
          particle.style.cssText="position:absolute;width:6px;height:6px;background:"+color+";border-radius:50%;left:"+x+"px;top:"+y+"px;";
          container.appendChild(particle);
          var angle=Math.random()*Math.PI*2;
          var speed=Math.random()*4+2;
          var vx=Math.cos(angle)*speed;
          var vy=Math.sin(angle)*speed;
          var startTime=Date.now();
          var duration=1000+Math.random()*500;
          (function(particle,vx,vy,startTime,duration){
            function animate(){
              var elapsed=Date.now()-startTime;
              var progress=elapsed/duration;
              if(progress>=1){particle.remove();return;}
              particle.style.left=(x+vx*elapsed*0.1)+"px";
              particle.style.top=(y+vy*elapsed*0.1+0.5*9.8*(elapsed*0.001)*(elapsed*0.001)*50)+"px";
              particle.style.opacity=(1-progress)+"";
              requestAnimationFrame(animate);
            }
            animate();
          })(particle,vx,vy,startTime,duration);
        }
      },f*600);
    })(f);
  }
}

function playCelebrationSound(){
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    var notes=[523,659,784,1047,784,659,523];
    notes.forEach(function(freq,i){
      setTimeout(function(){
        var osc=ctx.createOscillator();
        var gain=ctx.createGain();
        osc.connect(gain);gain.connect(ctx.destination);
        osc.frequency.value=freq;
        osc.type="sine";
        gain.gain.setValueAtTime(0.3,ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime+0.4);
      },i*200);
    });
  }catch(e){}
}

  html+='<button class="btn" style="border-color:#666;color:#666;" onclick="CM()">Cancelar</button>';

}
function doConfirmarAccion(){
  var pass=document.getElementById("auth-pass")?document.getElementById("auth-pass").value:"";
  var user=getUsuarios().find(function(u){return CU&&u.id===CU.id;});
  if(!user||pass!==user.pass){
    var err=document.getElementById("auth-err");
    if(err)err.style.display="block";
    var inp=document.getElementById("auth-pass");
    if(inp){inp.value="";inp.focus();}
    return;
  }
  CM();
  if(window._authCallback)window._authCallback();
}

function SD(){
  try{

  }catch(e){
    try{

    }catch(e2){}
  }
  showSBar();
}
function LD(){
  var lic=getLicenseData();
  if(lic&&lic.codigo) setEncryptKey(lic.codigo);
  var raw=null;
  try{raw=localStorage.getItem("gm3");}catch(e){}
  if(!raw) try{raw=sessionStorage.getItem("gm3");}catch(e){}
  if(raw){
    try{
      var parsed=decryptData(raw);
      if(parsed&&typeof parsed==="object"){
        D=parsed;
        if(D._user){CU=D._user;delete D._user;}
        return true;
      }
    }catch(e){}
  }
  D=defData();
  return false;
}

function exportarRespaldo(){
  try{
    var raw=localStorage.getItem("gm3")||"{}";
    var data={};
    try{data=decryptData(raw);}catch(e1){try{data=JSON.parse(raw);}catch(e2){data={};}}
    if(!data||typeof data!=="object") data={};
    delete data._user;
    data.exportadoEn=new Date().toISOString();
    data.version="GradManager2025";
    data.appVersion="v111";
    var json=JSON.stringify(data,null,2);
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    var fecha=new Date().toISOString().split("T")[0];
    a.href=url;
    a.download="GradManager_respaldo_"+fecha+".json";
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
    addN("📤 Respaldo exportado: "+fecha);
  }catch(e){
    alert("Error al exportar: "+e.message);
  }
}

function importarRespaldo(input){
  var file=input.files[0];
  if(!file){return;}
  // Read file FIRST before any modal/confirm
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data||typeof data!=="object"){alert("Archivo no valido.");return;}
      // Store parsed data globally then confirm
      window._importData=data;
      confirmarAccion("Importar respaldo '"+file.name+"'? Los datos actuales seran reemplazados.",function(){
        var d=window._importData;
        if(!d){alert("Error: datos perdidos. Intenta de nuevo.");return;}
        if(d.students)D.students=d.students;
        if(d.awards)D.awards=d.awards;
        if(d.providers)D.providers=d.providers;
        if(d.rifas)D.rifas=d.rifas;
        if(d.subastas)D.subastas=d.subastas;
        if(d.ensayos)D.ensayos=d.ensayos;
        if(d.budget)D.budget=d.budget;
        if(d.fundraising)D.fundraising=d.fundraising;
        if(d.votaciones)D.votaciones=d.votaciones;
        if(d.encuestas)D.encuestas=d.encuestas;
        if(d.actas)D.actas=d.actas;
        if(d.programa)D.programa=d.programa;
        if(d.anuncios)D.anuncios=d.anuncios;
        if(d.mensajes)D.mensajes=d.mensajes;
        if(d.ventas)D.ventas=d.ventas;
        if(d.invConfig)D.invConfig=d.invConfig;
        if(d.gradConfig)D.gradConfig=d.gradConfig;
        if(d.permisos)D.permisos=d.permisos;
        if(d.usuarios)D.usuarios=d.usuarios;
        if(d.compras)D.compras=d.compras;
        if(d.checklist)D.checklist=d.checklist;
        if(d.PARTS)D.PARTS=d.PARTS;
        window._importData=null;
        SD();
        alert("✅ Respaldo importado correctamente.");
        go("dash");
      });
    }catch(err){
      alert("Error al leer el archivo: "+err.message);
    }
  };
  reader.readAsText(file);
  input.value="";
}

    html+='<button class="btn bs" onclick="irAvisos()">+ Nuevo</button></div>';
    ants.slice(0,2).forEach(function(a){
      var pc=a.prio==="alta"?"#C94C7A":"#C9A84C";
      html+='<div class="li"><div><div class="it">'+a.titulo+'</div><div class="is">'+a.texto.slice(0,50)+'...</div></div><span class="badge" style="color:'+pc+';border:1px solid '+pc+';">'+a.prio+'</span></div>';
    });
    html+='</div>';

  if(conDeuda_count>0){
    html+='<div style="background:#C94C7A15;border:1px solid #C94C7A40;border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;" onclick="irAlertas()">';

  }
  html+='<button class="btn bs bb bw" onclick="expReporteGeneral()">📄 Exportar Reporte General</button>';
  document.getElementById("s-dash").innerHTML=html;
}

function rStudents(){
  const c=CU?CU.color:"#C9A84C";
  const sts=sortByName(gST());
  document.getElementById("s-stud").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-size:16px;color:#ddd;">${sts.length>=280?"⚠️ ":""}Estudiantes (${sts.length}${sts.length>=280?" / 300 — limite cercano":""})</span>
      <div style="display:flex;gap:6px;">
        <button class="btn bs bb" onclick="expStudPDF()">📄</button>
        <button class="btn bs" style="border-color:${c};color:${c};background:${c}20;" onclick="oAddSt()">+ Agregar</button>
      </div>
    </div>
    <div class="g3">
      <div class="sb" style="border-color:#4CC97A;"><div class="sv" style="color:#4CC97A;">${sts.filter(s=>cP(s.pagos)>=cT(s.parts)).length}</div><div class="sl">Al dia</div></div>
      <div class="sb" style="border-color:#C9A84C;"><div class="sv" style="color:#C9A84C;">${sts.filter(s=>cP(s.pagos)>0&&cP(s.pagos)<cT(s.parts)).length}</div><div class="sl">Parcial</div></div>
      <div class="sb" style="border-color:#C94C7A;"><div class="sv" style="color:#C94C7A;">${sts.filter(s=>cP(s.pagos)===0).length}</div><div class="sl">Sin pagar</div></div>
    </div>
    ${sts.map(s=>{
      const tot=cT(s.parts),pag=cP(s.pagos),sal=tot-pag;
      const sc=sal<=0?"#4CC97A":pag>0?"#C9A84C":"#C94C7A";
      const sinCuotas=(!s.parts||s.parts.length===0);
      const slbl=sinCuotas?"⚠️ Sin cuotas":sal<=0?"Al dia":pag>0?"Parcial":"Pendiente";
      const scolor=sinCuotas?"#C9A84C":sal<=0?"#4CC97A":"#C94C7A";
      const aw=gAW().filter(a=>a.sid===s.id&&a.ok).map(a=>{const t=ATY.find(x=>x.id===a.tid);return t?t.icon:"";}).join("");
      return `<div class="card" style="border-color:${sc}33;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
          <div style="flex:1;">
            <div style="font-size:15px;color:#ddd;margin-bottom:3px;">${s.nombre} ${aw}</div>
            <div style="font-size:11px;color:#666;margin-bottom:2px;">🪪 ${s.carnet} · 📚 ${s.carrera}</div>
            <div style="font-size:11px;color:#666;">📞 ${s.tel||"—"}${s.gpa?` · <span style="color:${c};font-weight:bold;">GPA:${s.gpa}</span>`:""}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:8px;">
            <span class="badge" style="color:${sc};border:1px solid ${sc};">${slbl}</span>
            <div style="font-size:13px;color:#ddd;margin-top:5px;">${fD(pag)}<span style="color:#555;">/${fD(tot)}</span></div>
          </div>
        </div>
        ${pb(pag,tot,sc)}
        <div class="g2" style="margin-top:10px;gap:6px;">

          ${(cP(s.pagos)<cT(s.parts))?`<div style="grid-column:span 2;font-size:11px;color:#C94C7A;text-align:center;padding:7px;background:#C94C7A10;border-radius:8px;border:1px solid #C94C7A30;">⚠ Saldo pendiente: ${fD(cT(s.parts)-cP(s.pagos))} — entregas y eventos bloqueados</div>`:""}
          ${CU&&CU.role!=="estudiante"&&CU.role!=="padres"?`<button class="btn bs bb" style="font-size:11px;" data-id="${s.id}" onclick="oEditSt(parseInt(this.dataset.id))">Editar datos</button>
          <button class="btn bs" style="font-size:11px;border-color:#7C6CD4;color:#7C6CD4;background:#7C6CD420;" data-id="${s.id}" onclick="mEntregasDetalle(parseInt(this.dataset.id))">📦 Entregas</button>
          <button class="btn bs br" style="font-size:11px;" data-id="${s.id}" onclick="delSt(parseInt(this.dataset.id))">🗑️</button>
          <button class="btn bs" style="font-size:11px;border-color:#C9A84C;background:#C9A84C20;color:#C9A84C;" data-id="${s.id}" onclick="oParts(parseInt(this.dataset.id))">✎ Actividades</button>
          <button class="btn bs bp" style="font-size:11px;" data-id="${s.id}" onclick="oPay(parseInt(this.dataset.id))">🧾 Pagos</button>`:""}
          <button class="btn bs bg" style="font-size:11px;" data-id="${s.id}" onclick="cSt(parseInt(this.dataset.id))">📞 Contactar</button>
        </div>
      </div>`;
    }).join("")}`;
}


function delSt(sid){
  var s=gST().find(function(x){return x.id===sid;});
  if(!s)return;
  confirmarAccion("Eliminar a "+s.nombre+" de la lista de estudiantes? Esta accion no se puede deshacer.",function(){
    D.students=gST().filter(function(x){return x.id!==sid;});
    SD();addN("🗑️ "+s.nombre+" eliminado");rStudents();
  });
}
function oEditSt(sid){
  var s=gST().find(function(x){return x.id===sid;});if(!s)return;
  var html="";
  html+='<div class="moh"><span class="mot">✎ Editar Estudiante</span><button class="moc" onclick="CM()">✕</button></div>';
  var _np=s.nombre.trim().split(" ");
  var _fn=_np[0]||"";
  var _ln1=_np.length>=2?_np[1]:"";
  var _ln2=_np.length>=3?_np.slice(2).join(" "):"";
  html+='<input class="inp" id="es-n" value="'+_fn+'" placeholder="Nombre(s) *"/>';
  html+='<div class="r2"><input class="inp" id="es-ap1" value="'+_ln1+'" placeholder="Primer apellido *"/><input class="inp" id="es-ap2" value="'+_ln2+'" placeholder="Segundo apellido (opcional)"/></div>';
  html+='<div class="r2">';
  html+='<input class="inp" id="es-c" value="'+s.carnet+'" placeholder="Carnet"/>';
  html+='<input class="inp" id="es-ca" value="'+s.carrera+'" placeholder="Carrera" />';
  html+='</div>';
  html+='<div class="r2">';
  html+='<input class="inp" id="es-t" value="'+(s.tel||"")+'" placeholder="Telefono" type="tel"/>';
  html+='<input class="inp" id="es-e" value="'+(s.email||"")+'" placeholder="Email" type="email"/>';
  html+='</div>';
  html+='<div class="r2">';
  html+='<input class="inp" id="es-g" value="'+(s.gpa||"")+'" placeholder="GPA" type="number" step="0.1"/>';
  html+='<select class="inp" id="es-tl">';
  TALLAS.forEach(function(t){html+='<option'+(s.toga&&s.toga.talla===t?" selected":"")+'>'+t+'</option>';});
  html+='</select></div>';
  html+='<div style="display:flex;gap:8px;">';
  html+='<button class="btn" style="flex:1;" data-id="'+sid+'" onclick="saveEditSt(parseInt(this.dataset.id))">✓ Guardar</button>';
  html+='<button class="btn" style="border-color:#666;color:#666;" onclick="CM()">Cancelar</button>';
  html+='</div>';
  OM(html);
}
function saveEditSt(sid){
  var nBase=document.getElementById("es-n")?document.getElementById("es-n").value.trim():"";
  var ap1=document.getElementById("es-ap1")?document.getElementById("es-ap1").value.trim():"";
  var ap2=document.getElementById("es-ap2")?document.getElementById("es-ap2").value.trim():"";
  if(!nBase||!ap1){alert("Escribe el nombre y primer apellido.");return;}
  const n=nBase+" "+ap1+(ap2?" "+ap2:"");
  D.students=gST().map(s=>s.id===sid?{...s,nombre:n,carnet:document.getElementById("es-c").value,carrera:document.getElementById("es-ca").value,tel:document.getElementById("es-t").value,email:document.getElementById("es-e").value,gpa:parseFloat(document.getElementById("es-g").value)||0,toga:{...s.toga,talla:document.getElementById("es-tl").value}}:s);
  SD();addN(`✎ Estudiante actualizado: ${n}`);CM();rStudents();
}

    html+='<span style="font-size:12px;color:'+(sel?c:"#555")+';pointer-events:none;">'+fD(p.costo)+'</span>';

  });
  html+='<div id="pts-tot" style="display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid #1e1e28;margin-top:4px;">';
  html+='<span style="color:#aaa;">'+(s.parts||[]).length+' actividad(es)</span>';
  html+='<span style="color:'+c+';font-weight:bold;">'+fD(cT(s.parts||[]))+'</span>';
  html+='</div>';
  html+='<div class="ct" style="margin-top:8px;">AGREGAR</div>';
  html+='<div style="display:flex;gap:6px;margin-bottom:6px;">';
  html+='<input class="inp" id="np-icon" placeholder="🎓" style="flex:0 0 46px;margin:0;" maxlength="2"/>';
  html+='<input class="inp" id="np-l" placeholder="Nombre *" style="flex:2;margin:0;"/>';
  html+='<input class="inp" id="np-c" type="number" placeholder="$" style="flex:0 0 60px;margin:0;"/>';
  html+='</div>';
  html+=renderEmojiPicker("np-icon");
  html+='<button class="btn bs bw" onclick="addPartModal('+sid+')">+ Agregar</button>';
  OM(html);
}

function togPA(el){
  if(!el) return;
  var pid=el.getAttribute("data-pid");
  var sid=parseInt(el.getAttribute("data-sid"));
  if(!pid||!sid) return;
  var sel=el.getAttribute("data-sel")==="1";
  var newSel=!sel;
  var c=CU?CU.color:"#C9A84C";
  // Update visual
  el.setAttribute("data-sel",newSel?"1":"0");
  el.style.background=newSel?c+"25":"#12121a";
  el.style.borderColor=newSel?c:"#2a2a3a";
  var circle=el.querySelector("div>div");
  if(circle){circle.style.borderColor=newSel?c:"#555";circle.style.background=newSel?c:"transparent";circle.textContent=newSel?"✓":"";}
  var nameSpan=el.querySelector("span");
  if(nameSpan) nameSpan.style.color=newSel?c:"#ddd";
  var priceSpan=el.querySelectorAll("span")[1]||el.querySelector("span:last-child");
  if(priceSpan) priceSpan.style.color=newSel?c:"#555";
  // Update data
  D.students=gST().map(function(x){
    if(x.id!==sid) return x;
    var np=newSel?(x.parts||[]).concat([pid]):(x.parts||[]).filter(function(i){return i!==pid;});
    return Object.assign({},x,{parts:np});
  });
  var ns=gST().find(function(x){return x.id===sid;});
  var tot=document.getElementById("pts-tot");
  if(tot) tot.innerHTML='<span style="color:#aaa;">'+(ns.parts||[]).length+' actividad(es)</span><span style="color:'+c+';font-weight:bold;">'+fD(cT(ns.parts||[]))+'</span>';
  SD();
}

function addPartModal(sid){
  var lbl=document.getElementById("np-l")?document.getElementById("np-l").value.trim():"";
  var icon=document.getElementById("np-icon")?document.getElementById("np-icon").value.trim():"📦";
  var costo=parseFloat(document.getElementById("np-c")?document.getElementById("np-c").value:0)||0;
  if(!lbl){alert("Escribe el nombre.");return;}
  if(!D.PARTS)D.PARTS=[];
  D.PARTS.push({id:"c"+Date.now(),label:lbl,costo:costo,icon:icon||"📦"});
  SD();
  rPartsModal(sid);
}
