<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>GradManager 2025 — v97</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Georgia,serif;background:#0a0a0f;color:#e8e0d0;min-height:100vh;}
.sc{display:none;padding:14px;padding-bottom:90px;}.sc.on{display:block;}
.hdr{background:#12121a;border-bottom:1px solid #2a2a3a;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#12121a;border-top:1px solid #1e1e28;display:flex;z-index:100;overflow-x:auto;scrollbar-width:none;}
.bnav::-webkit-scrollbar{display:none;}
.nb{flex:0 0 auto;padding:10px 12px;border:none;background:transparent;color:#555;font-family:Georgia,serif;font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:58px;border-top:2px solid transparent;}
.nb.on{color:#C9A84C;border-top-color:#C9A84C;}
.nb span:first-child{font-size:18px;}
.card{background:#12121a;border:1px solid #C9A84C30;border-radius:12px;padding:14px;margin-bottom:12px;}
.ct{font-size:10px;letter-spacing:3px;color:#C9A84C;text-transform:uppercase;margin-bottom:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.sb{background:#0d0d16;border-radius:10px;padding:12px;text-align:center;border:1px solid #2a2a3a;}
.sv{font-size:20px;font-weight:bold;margin-bottom:3px;}
.sl{font-size:10px;color:#666;}
.btn{display:inline-block;padding:9px 16px;border-radius:8px;border:1px solid #C9A84C;background:#C9A84C20;color:#C9A84C;font-family:Georgia,serif;font-size:13px;cursor:pointer;text-align:center;}
.bw{width:100%;display:block;}
.bs{padding:6px 12px;font-size:12px;}
.bg{border-color:#4CC97A!important;background:#4CC97A20!important;color:#4CC97A!important;}
.br{border-color:#C94C7A!important;background:#C94C7A20!important;color:#C94C7A!important;}
.bb{border-color:#4CA8C9!important;background:#4CA8C920!important;color:#4CA8C9!important;}
.bp{border-color:#7C6CD4!important;background:#7C6CD420!important;color:#7C6CD4!important;}
.inp{width:100%;background:#0d0d16;border:1px solid #2a2a3a;border-radius:8px;padding:10px 12px;color:#ddd;font-family:Georgia,serif;font-size:13px;outline:none;margin-bottom:10px;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
textarea.inp{min-height:68px;resize:vertical;}
select.inp{appearance:none;}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.pb{height:6px;background:#1e1e28;border-radius:3px;overflow:hidden;margin:4px 0;}
.pf{height:100%;border-radius:3px;transition:width .4s;}
.li{padding:10px 0;border-bottom:1px solid #1e1e28;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.li:last-child{border-bottom:none;}
.it{font-size:14px;color:#ddd;margin-bottom:3px;}
.is{font-size:11px;color:#666;}
.dv{height:1px;background:#1e1e28;margin:12px 0;}
.chip{display:inline-block;padding:7px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #333;color:#666;background:transparent;font-family:Georgia,serif;margin:3px;}
.chip.on{border-color:#C9A84C;color:#C9A84C;background:#C9A84C20;}
#lgs{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.mov{display:none;position:fixed;inset:0;background:#000b;z-index:500;align-items:flex-end;justify-content:center;}
.mov.on{display:flex;}
.mob{background:#12121a;border:1px solid #C9A84C40;border-radius:14px 14px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:18px;}
.moh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.mot{font-size:15px;color:#ddd;}
.moc{background:none;border:none;color:#555;font-size:22px;cursor:pointer;}
#sbar{position:fixed;top:0;left:0;right:0;background:#4CC97A;color:#000;font-size:12px;text-align:center;padding:6px;z-index:999;display:none;font-family:Georgia,serif;font-weight:bold;}
</style>
</head>
<body>
<div id="sbar">💾 Guardado correctamente</div>

<!-- LOGIN -->
<div id="lgs">
  <div style="width:100%;max-width:350px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:52px;margin-bottom:8px;">🎓</div>
      <h1 style="font-size:24px;font-weight:normal;color:#e8e0d0;">GradManager</h1>
      <div style="font-size:10px;color:#333;margin-top:2px;">v97-FINAL</div>
      <p id="login-grad" style="font-size:13px;color:#C9A84C;margin-top:5px;font-weight:bold;"></p>
      <div style="display:flex;justify-content:center;gap:8px;margin-bottom:8px;">
        <button id="lang-es" onclick="setLang('es')" style="padding:4px 14px;border-radius:16px;border:1px solid #C9A84C;background:#C9A84C20;color:#C9A84C;font-size:12px;cursor:pointer;font-family:Georgia,serif;">🇬🇹 ES</button>
        <button id="lang-en" onclick="setLang('en')" style="padding:4px 14px;border-radius:16px;border:1px solid #333;background:transparent;color:#666;font-size:12px;cursor:pointer;font-family:Georgia,serif;opacity:0.4;">🇺🇸 EN</button>
      </div>
    </div>
    <input class="inp" id="le" type="email" placeholder="Correo electronico"/>
    <input class="inp" id="lp" type="password" placeholder="Contrasena" onkeydown="if(event.key==='Enter')login()"/>
    <div id="lerr" style="color:#C94C7A;font-size:13px;margin-bottom:8px;display:none;">⚠ Correo o contrasena incorrectos.</div>
    <button class="btn bw" id="login-btn" onclick="login()" style="padding:13px;font-size:15px;margin-bottom:8px;">Ingresar</button>
    <div style="text-align:center;margin-bottom:12px;">
      <span onclick="if(confirm('Limpiar datos en cache?')){localStorage.clear();location.reload();}" id="login-cache-link" style="font-size:11px;color:#333;cursor:pointer;text-decoration:underline;">Limpiar cache</span>
    </div>

    <div style="background:#12121a;border:1px solid #1e1e28;border-radius:10px;padding:12px;">
      <div id="login-users-label" style="font-size:10px;color:#444;letter-spacing:2px;margin-bottom:8px;">USUARIOS</div>
      <div id="login-users"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="av" style="width:36px;height:36px;border-radius:50%;background:#C9A84C22;border:1px solid #C9A84C;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:#C9A84C;">CM</div>
      <div>
        <div id="hr" style="font-size:10px;letter-spacing:3px;color:#C9A84C;text-transform:uppercase;">⚡ ADMIN</div>
        <div id="hn" style="font-size:15px;color:#ddd;">Carlos Mendez</div>
        <div id="hgrad" style="font-size:10px;color:#555;" onclick="if(CU&&CU.role==='admin')oEditGrad()"></div>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div style="position:relative;cursor:pointer;" onclick="toggleN()">
        <span style="font-size:22px;">🔔</span>
        <div id="nd" style="display:none;position:absolute;top:0;right:0;width:8px;height:8px;background:#C94C7A;border-radius:50%;"></div>
      </div>
      <button onclick="oSearch()" style="background:none;border:none;color:#888;cursor:pointer;font-size:20px;padding:4px 8px;">🔍</button>
      <button class="btn bs" onclick="logout()">Salir</button>
    </div>
  </div>
  <div id="npanel" style="display:none;position:fixed;top:58px;right:8px;width:280px;background:#1a1a25;border:1px solid #C9A84C40;border-radius:10px;z-index:200;max-height:300px;overflow-y:auto;">
    <div style="padding:10px 14px;border-bottom:1px solid #222;display:flex;justify-content:space-between;">
      <span style="font-size:11px;color:#C9A84C;letter-spacing:2px;">NOTIFICACIONES</span>
      <button onclick="clrN()" style="background:none;border:none;color:#555;font-size:11px;cursor:pointer;">Limpiar</button>
    </div>
    <div id="nlist"></div>
  </div>
  <div id="s-dash" class="sc on"></div>
  <div id="s-stud" class="sc"></div>
  <div id="s-awrd" class="sc"></div>
  <div id="s-rifa" class="sc"></div>
  <div id="s-suba" class="sc"></div>
  <div id="s-scan" class="sc"></div>
  <div id="s-prov" class="sc"></div>
  <div id="s-more" class="sc"><div id="mc"></div></div>
  <nav class="bnav">
    <button class="nb on" id="nb-dash" onclick="go('dash')"><span>◈</span>Inicio</button>
    <button class="nb" id="nb-stud" onclick="go('stud')"><span>🎓</span>Alumnos</button>
    <button class="nb" id="nb-awrd" onclick="go('awrd')"><span>🏆</span>Premios</button>
    <button class="nb" id="nb-rifa" onclick="go('rifa')"><span>🎫</span>Rifas</button>
    <button class="nb" id="nb-suba" onclick="go('suba')"><span>🔨</span>Subastas</button>
    <button class="nb" id="nb-scan" onclick="go('scan')"><span>📡</span>Escanear</button>
    <button class="nb" id="nb-prov" onclick="go('prov')"><span>🤝</span>Proveed.</button>
    <button class="nb" id="nb-more" onclick="go('more')"><span>☰</span>Mas</button>
  </nav>
</div>

<!-- MODAL -->
<div class="mov" id="mov" onclick="if(event.target===this)CM()">

</div>

function applyTranslation(){
  if((window._lang||"es")==="es")return;
  // Walk DOM and replace text nodes
  function walkNode(node){
    if(node.nodeType===3){// Text node
      var txt=node.nodeValue.trim();
      if(txt&&EN_TRANSLATIONS[txt]){
        node.nodeValue=node.nodeValue.replace(txt,EN_TRANSLATIONS[txt]);
      }
    } else if(node.nodeType===1&&node.tagName!=="SCRIPT"&&node.tagName!=="STYLE"){
      for(var i=0;i<node.childNodes.length;i++){walkNode(node.childNodes[i]);}
    }
  }
  var mc=document.getElementById("mc");if(mc)walkNode(mc);
  var sdash=document.getElementById("s-dash");if(sdash)walkNode(sdash);
  var sprov=document.getElementById("s-prov");if(sprov)walkNode(sprov);

}

function validateLicense(codigo, email){
  return new Promise(function(resolve){
    try{
      var url=SUPA_URL+"/rest/v1/licencias?codigo=eq."+encodeURIComponent(codigo)+"&email=eq."+encodeURIComponent(email)+"&select=*&apikey="+SUPA_KEY;
      var xhr=new XMLHttpRequest();
      xhr.open("GET", url, true);
      xhr.setRequestHeader("apikey", SUPA_KEY);
      xhr.setRequestHeader("Authorization", "Bearer "+SUPA_KEY);
      xhr.onreadystatechange=function(){
        if(xhr.readyState===4){
          if(xhr.status===200){
            try{
              var data=JSON.parse(xhr.responseText);
              if(!data||!data.length){resolve({valid:false,error:"Codigo o correo invalido"});return;}
              var lic=data[0];
              if(!lic.activa){resolve({valid:false,error:"Licencia inactiva"});return;}
              var venc=new Date(lic.fecha_vencimiento);
              if(venc<new Date()){resolve({valid:false,error:"Licencia vencida el "+lic.fecha_vencimiento.split("T")[0]});return;}
              resolve({valid:true,licencia:lic});
            }catch(e){resolve({valid:false,error:"Error al leer respuesta"});}
          } else {
            resolve({valid:false,error:"Error "+xhr.status+": "+xhr.statusText});
          }
        }
      };
      xhr.onerror=function(){resolve({valid:false,error:"Error de red. Verifica tu conexion."});};
      xhr.ontimeout=function(){resolve({valid:false,error:"Tiempo de espera agotado."});};
      xhr.timeout=10000;
      xhr.send();
    }catch(e){
      resolve({valid:false,error:"Error: "+e.message});
    }
  });
}

function checkLicense(){
  var lic = getLicenseData();
  if(!lic) return false;
  // Check expiry locally
  var venc = new Date(lic.fecha_vencimiento);
  var now = new Date();
  if(venc < now){
    clearLicense();
    return false;
  }
  return true;
}

      fecha_vencimiento: result.licencia.fecha_vencimiento,

  var s=ests[idx];

  var cnt=document.getElementById("mas-count");
  if(cnt) cnt.textContent=idx+1;
  var act=document.getElementById("mas-actual");
  if(act){
    act.innerHTML='<div style="font-size:12px;color:#aaa;margin-bottom:4px;">'+(idx+1)+' de '+ests.length+'</div>'+

      '<div style="font-size:12px;color:#888;">📞 '+s.tel+'</div>';

  var btn=document.getElementById("mas-btn");
  if(btn) btn.textContent=window._masIdx<ests.length?"📱 Siguiente →":"📱 Ultimo";

  var n=String(s.tel).replace(/[^0-9]/g,"");

  setTimeout(function(){document.body.removeChild(a);},500);
}

  html+='<input class="inp" id="auth-pass" type="password" placeholder="Contrasena *" onkeydown="if(event.key===&quot;Enter&quot;)doConfirmarAccion()"/>';
  html+='<div id="auth-err" style="display:none;color:#C94C7A;font-size:13px;margin-bottom:8px;">❌ Contrasena incorrecta.</div>';

  html+='<button class="btn" style="border-color:#666;color:#666;" onclick="CM()">Cancelar</button>';
  html+='</div>';
  window._authCallback=callback;
  OM(html);
  setTimeout(function(){var el=document.getElementById("auth-pass");if(el)el.focus();},300);
}
function doConfirmarAccion(){
  var pass=document.getElementById("auth-pass")?document.getElementById("auth-pass").value:"";
  var user=getUsuarios().find(function(u){return CU&&u.id===CU.id;});
  if(!user||pass!==user.pass){
    var err=document.getElementById("auth-err");
    if(err)err.style.display="block";
    var inp=document.getElementById("auth-pass");
    if(inp){inp.value="";inp.focus();}
    return;
  }
  CM();
  if(window._authCallback)window._authCallback();
}

function exportarRespaldo(){
  try{
    var data=JSON.parse(localStorage.getItem("gm3")||"{}");
    delete data._user; // Don't export session
    data.exportadoEn=new Date().toISOString();
    data.version="GradManager2025";
    data.appVersion="v61";
    var json=JSON.stringify(data,null,2);
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    var fecha=new Date().toISOString().split("T")[0];
    a.href=url;
    a.download="GradManager_respaldo_"+fecha+".json";
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
    addN("📤 Respaldo exportado: "+fecha);
  }catch(e){
    alert("Error al exportar: "+e.message);
  }
}

function importarRespaldo(input){
  var file=input.files[0];
  if(!file){return;}
  // Read file FIRST before any modal/confirm
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data||typeof data!=="object"){alert("Archivo no valido.");return;}
      // Store parsed data globally then confirm
      window._importData=data;
      confirmarAccion("Importar respaldo '"+file.name+"'? Los datos actuales seran reemplazados.",function(){
        var d=window._importData;
        if(!d){alert("Error: datos perdidos. Intenta de nuevo.");return;}
        if(d.students)D.students=d.students;
        if(d.awards)D.awards=d.awards;
        if(d.providers)D.providers=d.providers;
        if(d.rifas)D.rifas=d.rifas;
        if(d.subastas)D.subastas=d.subastas;
        if(d.ensayos)D.ensayos=d.ensayos;
        if(d.budget)D.budget=d.budget;
        if(d.fundraising)D.fundraising=d.fundraising;
        if(d.votaciones)D.votaciones=d.votaciones;
        if(d.encuestas)D.encuestas=d.encuestas;
        if(d.actas)D.actas=d.actas;
        if(d.programa)D.programa=d.programa;
        if(d.anuncios)D.anuncios=d.anuncios;
        if(d.mensajes)D.mensajes=d.mensajes;
        if(d.ventas)D.ventas=d.ventas;
        if(d.invConfig)D.invConfig=d.invConfig;
        if(d.gradConfig)D.gradConfig=d.gradConfig;
        if(d.permisos)D.permisos=d.permisos;
        if(d.usuarios)D.usuarios=d.usuarios;
        if(d.compras)D.compras=d.compras;
        if(d.checklist)D.checklist=d.checklist;
        if(d.PARTS)D.PARTS=d.PARTS;
        window._importData=null;
        SD();
        alert("✅ Respaldo importado correctamente.");
        go("dash");
      });
    }catch(err){
      alert("Error al leer el archivo: "+err.message);
    }
  };
  reader.readAsText(file);
  input.value="";
}

  var tE=gST().reduce(function(s,st){return s+cT(st.parts);},0);

  var tFund=gFU().reduce(function(s,i){return s+i.rec;},0);
  var tSub=gSU().reduce(function(s,sub){return s+sub.rec;},0);
  var tVentas=(D.ventas&&D.ventas.ventas)?D.ventas.ventas.reduce(function(s,v){return s+v.total;},0):0;
  var tTotal=tR+tRifa+tFund+tSub+tVentas;

  html+='<div class="sl">'+(studDeuda?'<span style="color:#C94C7A;">'+studDeuda+' con deuda</span>':"Al dia")+'</div></div>';

  html+='<div class="sl">Toca para PDF</div></div>';
  html+='</div>';

  html+='<div class="card" style="margin-bottom:10px;">';
  html+='<div style="font-size:12px;color:#aaa;margin-bottom:10px;font-weight:bold;">📊 Recaudacion por fuente</div>';

    {l:"Subastas",v:tSub,c:"#C94C7A"},

function togPart(sid,pid){
  const s=gST().find(x=>x.id===sid);if(!s)return;
  const has=s.parts.includes(pid);
  D.students=gST().map(x=>x.id===sid?{...x,parts:has?x.parts.filter(i=>i!==pid):[...x.parts,pid]}:x);
  const p=gP().find(x=>x.id===pid);const sel=!has;const c=CU?CU.color:"#C9A84C";
  const btn=document.getElementById("pb-"+pid);
  if(btn){btn.style.background=sel?c+"25":"transparent";btn.style.borderColor=sel?c:"#333";btn.style.color=sel?c:"#666";btn.textContent=(sel?"✓ ":"")+p.label+" "+fD(p.costo);}
  const ns=gST().find(x=>x.id===sid);
  const tot=document.getElementById("pts-tot");
  if(tot)tot.innerHTML=`<span style="color:#aaa;">${ns.parts.length} actividad(es)</span><span style="color:${c};font-weight:bold;">${fD(cT(ns.parts))}</span>`;
  SD();rStudents();
}
function updPartC(pid,val){D.PARTS=gP().map(p=>p.id===pid?{...p,costo:parseFloat(val)||0}:p);SD();}
function delPart(pid,sid){if(!confirm("Eliminar esta actividad del catalogo?"))return;D.PARTS=gP().filter(p=>p.id!==pid);D.students=gST().map(s=>({...s,parts:s.parts.filter(i=>i!==pid)}));SD();addN("Actividad eliminada");rPartsCat(sid);rStudents();}
function addPart(sid){
  const lbl=document.getElementById("np-l").value.trim();

  CM();oParts(sid);
}

function oPay(sid){
  var s=gST().find(function(x){return x.id===sid;});if(!s)return;
  var tot=cT(s.parts),pag=cP(s.pagos),sal=tot-pag;
  var sc=sal<=0?"#4CC97A":pag>0?"#C9A84C":"#C94C7A";
  var html="";
  html+='<div class="moh"><span class="mot">💳 '+s.nombre+'</span><button class="moc" onclick="CM()">✕</button></div>';
  html+='<div class="g3" style="margin-bottom:10px;">';
  html+='<div class="sb"><div class="sv" style="font-size:15px;">'+fD(tot)+'</div><div class="sl">Total</div></div>';
  html+='<div class="sb"><div class="sv" style="font-size:15px;color:#4CC97A;">'+fD(pag)+'</div><div class="sl">Pagado</div></div>';
  html+='<div class="sb"><div class="sv" style="font-size:15px;color:'+sc+';">'+fD(sal)+'</div><div class="sl">Saldo</div></div>';
  html+='</div>';
  html+=pbHTML(pag,tot,sc,8);
  html+='<div style="font-size:11px;color:'+sc+';text-align:right;margin:4px 0 12px;">'+Math.round((pag/Math.max(tot,1))*100)+'%</div>';
  html+='<input class="inp" id="pm-con" placeholder="Concepto del pago *"/>';
  html+='<input class="inp" id="pm-monto" type="number" placeholder="Monto ($)"/>';
  html+='<button class="btn bw" data-id="'+sid+'" onclick="regPago(parseInt(this.dataset.id))" style="margin-bottom:12px;">💳 Registrar Pago y Generar Recibo</button>';
  html+='<div class="dv"></div>';
  html+='<div style="font-size:10px;color:#555;letter-spacing:2px;margin-bottom:10px;">HISTORIAL</div>';
  if(!s.pagos.length){
    html+='<div style="font-size:13px;color:#555;">Sin pagos registrados.</div>';
  } else {
    s.pagos.forEach(function(p){
      html+='<div class="li">';
      html+='<div><div class="it">'+p.con+'</div><div class="is">📅 '+p.f+'</div></div>';
      html+='<div style="display:flex;gap:6px;align-items:center;">';
      html+='<span style="font-size:14px;color:#4CC97A;font-weight:bold;">+'+fD(p.monto)+'</span>';
      html+='<button data-sid="'+sid+'" data-pid="'+p.id+'" onclick="printRecibo(parseInt(this.dataset.sid),this.dataset.pid)" style="background:none;border:1px solid #C9A84C40;color:#C9A84C;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:12px;">🧾</button>';
      html+='</div></div>';
    });
  }
  html+='<button class="btn bw" style="margin-top:12px;border-color:#666;color:#666;" onclick="CM()">Cerrar</button>';
  OM(html);
}
function regPago(sid){
  const con=document.getElementById("pm-con").value.trim();
  const monto=parseFloat(document.getElementById("pm-monto").value);
  if(!con||!monto||monto<=0)return;
  const p={id:"P"+Date.now(),f:tod(),monto,con};
  D.students=gST().map(s=>s.id===sid?{...s,pagos:[...s.pagos,p]}:s);
  SD();addN(`💳 Pago ${fD(monto)}`);CM();printRecibo(sid,p.id);rStudents();
}
function printRecibo(sid,pid){
  const s=gST().find(x=>x.id===sid);
  const p=(s&&s.pagos).find(x=>x.id===pid);
  if(!s||!p)return;
  const num="REC-"+String(pid).slice(-6).toUpperCase();
  const w=window.open("","_blank");
  if(!w){alert("Permite ventanas emergentes para imprimir.");return;}
  w.document.write(`<html><head><style>body{font-family:Georgia,serif;max-width:360px;margin:28px auto;padding:18px;border:2px solid #C9A84C;border-radius:12px;color:#222;}h2{color:#C9A84C;text-align:center;}.row{display:flex;justify-content:space-between;margin:7px 0;font-size:13px;}.amt{font-size:24px;font-weight:bold;color:#1a7a3a;text-align:center;padding:12px;background:#f0fff4;border-radius:8px;margin:12px 0;}</style></head><body><h2>🎓 Recibo de Pago</h2><p style="text-align:center;color:#888;font-size:12px;">${num}</p><hr/><div class="row"><span>Estudiante:</span><strong>${s.nombre}</strong></div><div class="row"><span>Carnet:</span><span>${s.carnet}</span></div><div class="row"><span>Concepto:</span><span>${p.con}</span></div><div class="row"><span>Fecha:</span><span>${p.f}</span></div><hr/><div class="amt">${fD(p.monto)}</div><p style="text-align:center;font-size:10px;color:#999;">GradManager 2025 · ${new Date().toLocaleDateString("es-GT")}</p></body></html>`);
  w.document.close();setTimeout(()=>w.print(),400);
}

function updAwStList(){
  var c=CU?CU.color:"#C9A84C";
  var tid=window._selAT||"alto_honor";
  var yaAsig=gAW().filter(function(a){return a.tid===tid;}).map(function(a){return a.sid;});
  window._selAwSts=(window._selAwSts||[]).filter(function(sid){return !yaAsig.includes(sid);});
  var avail=gST().filter(function(s){return !yaAsig.includes(s.id);});
  var listEl=document.getElementById("aw-stlist");
  if(!listEl)return;
  if(avail.length===0){
    listEl.innerHTML='<div style="font-size:13px;color:#555;padding:8px;">Todos ya tienen este reconocimiento.</div>';
  } else {
    var html="";
    avail.forEach(function(s){
      var sel=window._selAwSts.includes(s.id);
      var icons=gAW().filter(function(a){return a.sid===s.id&&a.tid!==tid;}).map(function(a){var t=ATY.find(function(t){return t.id===a.tid;});return t?t.icon:"";}).join("");
      html+='<button data-sid="'+s.id+'" onclick="togAwSt(parseInt(this.dataset.sid))"';
      html+=' style="padding:7px 12px;border-radius:20px;cursor:pointer;font-family:Georgia,serif;font-size:12px;margin:3px;';
      html+=sel?'border:1px solid '+c+';color:'+c+';background:'+c+'20;':'border:1px solid #333;color:#666;background:transparent;';
      html+='">'+(sel?"✓ ":"")+s.nombre.split(" ")[0]+(icons?" "+icons:"")+(s.gpa?" ("+s.gpa+")":"")+"</button>";
    });
    listEl.innerHTML=html;
  }
  updAwSummary();
}

function updAwSummary(){
  var c=CU?CU.color:"#C9A84C";

function togAwSt(sid){
  if(!window._selAwSts) window._selAwSts=[];

function saveNewAw(){
  const m=document.getElementById("na-m").value.trim();
  if(!m){alert("Escribe la descripcion del merito.");return;}
  var _rawSids=window._selAwSts&&window._selAwSts.length>0?window._selAwSts:[];
  var _sidMap={};_rawSids.forEach(function(x){_sidMap[x]=true;});
  const sids=Object.keys(_sidMap).map(Number);
  if(!sids.length){alert("Selecciona al menos un estudiante.");return;}
  if(!D.awards)D.awards=[];
  const gpa=parseFloat(document.getElementById("na-g").value)||null;
  const ok=document.getElementById("na-ok").checked;
  let orden=parseInt(document.getElementById("na-or").value)||gAW().length+1;
  sids.forEach((sid,i)=>{
    D.awards.push({
      id:Date.now()+i,
      sid,
      tid:window._selAT||"alto_honor",
      gpa: gpa || ((function(){var _s=gST().find(function(s){return s.id===sid;});return _s?_s.gpa:null;})()) || null,
      merito:m,
      by:CU?CU.role:"admin",
      orden:orden+i,
      ok
    });
  });
  SD();
  addN(`🏆 ${sids.length} reconocimiento(s) asignado(s)`);
  CM();
  rAwards();
}

function oPayProv(pid){
  var p=gPR().find(function(x){return x.id===pid;});if(!p)return;
  if(p.estado!=="contratado"){
    alert("No se pueden registrar pagos. El proveedor esta en estado '"+p.estado+"'. Cambia el estado a Contratado primero.");
    return;
  }
  if(!p.pagos)p.pagos=[];
  var pag=p.pagos.reduce(function(s,x){return s+x.monto;},0);
  var sal=p.ctr-pag;
  var sc=sal<=0?"#4CC97A":pag>0?"#C9A84C":"#C94C7A";
  var html="";
  html+='<div class="moh"><span class="mot">💳 '+p.empresa+'</span><button class="moc" onclick="CM()">✕</button></div>';

  html+='<div class="g3" style="margin-bottom:10px;">';

  html+='<div class="sb"><div class="sv" style="font-size:15px;color:'+sc+';">'+fD(sal)+'</div><div class="sl">Saldo</div></div>';
  html+='</div>';
  html+=pbHTML(pag,p.ctr,sc,8);
  html+='<div style="font-size:11px;color:'+sc+';text-align:right;margin:4px 0 14px;">'+Math.round((pag/Math.max(p.ctr,1))*100)+'%</div>';
  // Quick pay buttons
  if(sal>0){
    html+='<div style="font-size:11px;color:#555;letter-spacing:2px;margin-bottom:8px;">REGISTRAR PAGO</div>';
    html+='<input class="inp" id="pp-con" placeholder="Concepto (ej: Anticipo, Saldo final)"/>';

  }

  html+='<div style="font-size:11px;color:#555;letter-spacing:2px;margin-bottom:8px;">HISTORIAL</div>';
  if(!p.pagos.length){
    html+='<div style="font-size:13px;color:#555;margin-bottom:12px;">Sin pagos registrados.</div>';

    p.pagos.forEach(function(pg){
      html+='<div class="li">';

let scanEv="jarana";
function rScanner(){
  var evts={jarana:{l:"Jarana/Fiesta",i:"🎉"},bformal:{l:"Baile Formal",i:"💃"},cere:{l:"Ceremonia",i:"🎓"}};
  var ks=["jarana","bformal","cere"];
  var st=gST().reduce(function(a,s){var v=s.asis[scanEv];if(v==="entrada")a.d++;else if(v==="salida")a.s++;else a.n++;return a;},{d:0,s:0,n:0});
  var html="";
  html+='<div class="ct">📡 Escanear QR — Seguridad</div>';
  html+='<div style="display:flex;gap:8px;margin-bottom:14px;">';
  ks.forEach(function(k){
    var v=evts[k];var on=scanEv===k;
    html+='<button data-ev="'+k+'" onclick="scanEv=this.dataset.ev;rScanner();" style="flex:1;padding:10px 4px;border-radius:10px;cursor:pointer;font-family:Georgia,serif;font-size:11px;background:'+(on?"#C9A84C20":"#12121a")+';border:1px solid '+(on?"#C9A84C":"#2a2a3a")+';color:'+(on?"#C9A84C":"#666")+';text-align:center;"><div style="font-size:20px;margin-bottom:3px;">'+v.i+'</div>'+v.l+'</button>';
  });
  html+='</div>';
  html+='<div class="g3" style="margin-bottom:14px;">';
  html+='<div class="sb" style="border-color:#4CC97A;"><div style="font-size:18px;">✅</div><div class="sv" style="color:#4CC97A;">'+st.d+'</div><div class="sl">Dentro</div></div>';
  html+='<div class="sb" style="border-color:#C9A84C;"><div style="font-size:18px;">🚪</div><div class="sv" style="color:#C9A84C;">'+st.s+'</div><div class="sl">Salieron</div></div>';
  html+='<div class="sb" style="border-color:#555;"><div style="font-size:18px;">⏳</div><div class="sv" style="color:#888;">'+st.n+'</div><div class="sl">Sin reg.</div></div>';
  html+='</div>';
  html+='<div class="card" style="margin-bottom:12px;">';
  html+='<div class="ct">Ingresar codigo QR</div>';
  html+='<div style="display:flex;gap:8px;margin-bottom:6px;">';
  html+='<input class="inp" id="qr-in" placeholder="Ej: QR-001" style="flex:1;margin:0;" onkeydown="if(event.key===&quot;Enter&quot;)doScan();"/>';
  html+='<button class="btn" onclick="doScan()">Verificar</button>';
  html+='</div>';
  html+='<div style="font-size:11px;color:#444;">Codigos: '+gST().map(function(s){return s.qr;}).join(", ")+'</div>';
  html+='</div>';
  html+='<div id="scan-res"></div>';
  html+='<div class="card"><div class="ct">Lista de asistencia</div>';
  sortByName(gST()).forEach(function(s){
    var a=s.asis[scanEv];
    var cl=a==="entrada"?"#4CC97A":a==="salida"?"#C9A84C":"#444";
    var lbl=a==="entrada"?"✅":a==="salida"?"🚪":"⏳";
    html+='<div class="li"><div><div class="it">'+s.nombre+'</div><div class="is">'+s.qr+' · '+s.carrera+'</div></div>';
    html+='<div style="display:flex;gap:6px;align-items:center;"><span style="font-size:12px;color:'+cl+';">'+lbl+'</span>';
    html+='<button class="btn bs" style="font-size:11px;" data-qr="'+s.qr+'" onclick="doScanQR(this.dataset.qr)">Scan</button></div></div>';
  });
  html+='</div>';
  document.getElementById("s-scan").innerHTML=html;
}

function doScan(){const qr=(document.getElementById("qr-in")?document.getElementById("qr-in").value:"")||"";doScanQR(qr);}
function doScanQR(qr){
  const s=gST().find(x=>x.qr===qr.trim().toUpperCase());
  if(s && tieneSaldo(s.id)){
    var evNombre={jarana:"Jarana/Fiesta",bformal:"Baile Formal",cere:"Ceremonia"}[scanEv]||scanEv;
    var resEl2=document.getElementById("scan-res");
    if(resEl2) resEl2.innerHTML='<div class="card" style="border-color:#C94C7A60;margin-bottom:12px;"><div style="display:flex;gap:12px;align-items:center;"><div style="font-size:34px;">🚫</div><div><div style="font-size:16px;color:#ddd;font-weight:bold;">'+s.nombre+'</div><div style="font-size:13px;color:#C94C7A;margin-top:4px;font-weight:bold;">⚠ CUOTAS PENDIENTES — No puede ingresar a '+evNombre+'</div><div style="font-size:12px;color:#888;margin-top:2px;">Saldo pendiente: '+fD(cT(s.parts)-cP(s.pagos))+'</div></div></div></div>';
    return;
  }
  const res=document.getElementById("scan-res");if(!res)return;
  if(!s){res.innerHTML=`<div class="card" style="border-color:#C94C7A40;margin-bottom:12px;"><div style="color:#C94C7A;font-size:14px;">❌ QR no encontrado: ${qr}</div></div>`;return;}
  const cur=s.asis[scanEv];
  const nuevo=!cur?"entrada":cur==="entrada"?"salida":"entrada";
  D.students=gST().map(x=>x.id===s.id?{...x,asis:{...x.asis,[scanEv]:nuevo}}:x);
  SD();
  const col=nuevo==="entrada"?"#4CC97A":"#C9A84C";
  res.innerHTML=`<div class="card" style="border-color:${col}60;margin-bottom:12px;"><div style="display:flex;gap:12px;align-items:center;"><div style="font-size:34px;">${nuevo==="entrada"?"✅":"🚪"}</div><div><div style="font-size:16px;color:#ddd;font-weight:bold;">${s.nombre}</div><div style="font-size:12px;color:#888;">${s.carrera}</div><div style="font-size:14px;color:${col};margin-top:4px;font-weight:bold;">${nuevo==="entrada"?"🟢 ENTRADA":"🟡 SALIDA"} · ${nowT()}</div></div></div></div>`;
  const inp=document.getElementById("qr-in");if(inp)inp.value="";
  rScanner();
}

function autoFillVenta(sid){

function saveVenta(){
  var pid=window._ventaPid;
  if(!pid){alert("Error: recarga la pantalla.");return;}
  var nombre=document.getElementById("vm-n")?document.getElementById("vm-n").value.trim():"";
  if(!nombre){alert("Escribe el nombre del comprador.");return;}
  var cant=parseInt(document.getElementById("vm-cant")?document.getElementById("vm-cant").value:1)||1;
  var tel=document.getElementById("vm-tel")?document.getElementById("vm-tel").value.trim():"";
  var prods=gPR2();
  var p=prods.find(function(x){return x.id===pid;});
  if(!p)return;
  if(cant<1)cant=1;
  if(p.vendido+cant>p.stock){alert("Solo quedan "+(p.stock-p.vendido)+" unidades.");return;}
  var newProds=prods.map(function(x){
    if(x.id!==pid)return x;
    return {id:x.id,nombre:x.nombre,emoji:x.emoji,precio:x.precio,stock:x.stock,vendido:x.vendido+cant};
  });
  if(!D.ventas)D.ventas={productos:newProds,ventas:[]};
  D.ventas.productos=newProds;
  D.ventas.ventas.push({
    id:Date.now(),pid:pid,producto:p.nombre,emoji:p.emoji,
    comprador:nombre,tel:tel,
    cant:cant,precio:p.precio,total:p.precio*cant,fecha:tod(),hora:nowT()
  });
  SD();addN("🛒 "+cant+"x "+p.nombre+" a "+nombre+" — "+fD(p.precio*cant));
  CM();mVentas();
}
function registrarVenta(pid){
  var prods=gPR2();
  var p=prods.find(function(x){return x.id===pid;});
  if(!p)return;
  var cantEl=document.getElementById("vc-"+pid);
  var cant=cantEl?parseInt(cantEl.value)||1:1;
  if(cant<1)cant=1;
  if(p.vendido+cant>p.stock){alert("Solo quedan "+(p.stock-p.vendido)+" unidades.");return;}
  // Update product
  var newProds=prods.map(function(x){
    if(x.id!==pid)return x;
    return {id:x.id,nombre:x.nombre,emoji:x.emoji,precio:x.precio,stock:x.stock,vendido:x.vendido+cant};
  });
  // Add venta record
  if(!D.ventas)D.ventas={productos:newProds,ventas:[]};
  D.ventas.productos=newProds;
  D.ventas.ventas.push({id:Date.now(),pid:pid,producto:p.nombre,emoji:p.emoji,
    cant:cant,precio:p.precio,total:p.precio*cant,fecha:tod(),hora:nowT()});
  SD();addN("🛒 "+cant+"x "+p.nombre+" — "+fD(p.precio*cant));mVentas();
}

function adjConsigCant(pid,delta){
  if(!window._consigSel)window._consigSel={};
  var p=gPR2().find(function(x){return x.id===pid;});
  if(!p)return;
  var disp=p.stock-p.vendido;
  var cur=window._consigSel[pid]||0;
  var nuevo=cur+delta;
  if(nuevo<0)nuevo=0;
  if(nuevo>disp){alert("Solo hay "+disp+" unidades disponibles de "+p.nombre);return;}
  window._consigSel[pid]=nuevo;
  // Update counter display
  var el=document.getElementById("consig-cant-"+pid);
  if(el){
    el.textContent=nuevo;
    el.style.color=nuevo>0?"#C9A84C":"#ddd";
  }
  // Recalculate total
  var total=0;var resumen=[];
  gPR2().forEach(function(pr){
    var cant=window._consigSel[pr.id]||0;
    if(cant>0){
      total+=cant*pr.precio;
      resumen.push(cant+"x "+pr.nombre);
    }
  });
  var totEl=document.getElementById("consig-total");
  var resEl=document.getElementById("consig-resumen");
  if(totEl)totEl.textContent=fD(total);
  if(resEl)resEl.textContent=resumen.join(", ")||"Ninguno seleccionado";
}

function saveNewConsig(){
  var sid=parseInt(document.getElementById("nc-st")?document.getElementById("nc-st").value:0)||0;
  var ext=document.getElementById("nc-ext")?document.getElementById("nc-ext").value.trim():"";
  var notas=document.getElementById("nc-notas")?document.getElementById("nc-notas").value:"";
  var st=sid?gST().find(function(s){return s.id===sid;}):null;
  if(!sid&&!ext){alert("Selecciona un estudiante o escribe un nombre externo.");return;}
  // Build items from selection
  var items=[];var total=0;var resumen=[];
  gPR2().forEach(function(p){
    var cant=window._consigSel?window._consigSel[p.id]||0:0;
    if(cant>0){
      items.push({pid:p.id,nombre:p.nombre,emoji:p.emoji,cant:cant,precio:p.precio,subtotal:cant*p.precio});
      total+=cant*p.precio;
      resumen.push(cant+"x "+p.nombre);
    }
  });
  if(!items.length){alert("Selecciona al menos un producto para la consignacion.");return;}
  if(!D.ventas)D.ventas={productos:[],ventas:[],consignaciones:[]};
  if(!D.ventas.consignaciones)D.ventas.consignaciones=[];
  D.ventas.consignaciones.push({
    id:Date.now(),
    estudId:sid||null,
    estudiante:st?st.nombre:(ext||"Externo"),
    productos:resumen.join(", "),
    items:items,
    totalEntregado:total,
    totalCobrado:0,
    fecha:tod(),
    notas:notas,
    cobros:[],
    estado:"pendiente"
  });
  window._consigSel={};
  SD();addN("📦 Consignacion a "+(st?st.nombre:"Externo")+" — "+fD(total));CM();
  window._vtab="consig";mVentas();
}

function saveCobro(cid){
  var monto=parseFloat(document.getElementById("cb-monto")?document.getElementById("cb-monto").value:0)||0;
  if(!monto){alert("Ingresa el monto a cobrar.");return;}
  var nota=document.getElementById("cb-nota")?document.getElementById("cb-nota").value:"";
  D.ventas.consignaciones=gCS().map(function(c){
    if(c.id!==cid)return c;
    var newCobros=c.cobros.concat([{monto:monto,fecha:tod(),hora:nowT(),nota:nota}]);
    var newCobrado=c.totalCobrado+monto;
    return {id:c.id,estudId:c.estudId,estudiante:c.estudiante,productos:c.productos,
      totalEntregado:c.totalEntregado,totalCobrado:newCobrado,
      fecha:c.fecha,notas:c.notas,cobros:newCobros,
      estado:newCobrado>=c.totalEntregado?"saldado":"pendiente"};
  });
  SD();addN("💵 Cobro "+fD(monto)+" registrado");CM();
  window._vtab="consig";mVentas();
}

function expReporteGeneral(){
  var gc=gGC();
  var tR=gST().reduce(function(s,st){return s+cP(st.pagos);},0);
  var tE=gST().reduce(function(s,st){return s+cT(st.parts);},0);
  var tRifa=gRI().reduce(function(s,r){return s+r.rec;},0);
  var tFund=gFU().reduce(function(s,i){return s+i.rec;},0);
  var tSub=gSU().reduce(function(s,sub){return s+sub.rec;},0);
  var tVentas=(D.ventas&&D.ventas.ventas)?D.ventas.ventas.reduce(function(s,v){return s+v.total;},0):0;
  var tTotal=tR+tRifa+tFund+tSub+tVentas;
  var togasOk=gST().filter(function(s){return s.toga&&s.toga.ok;}).length;
  var studDeuda=gST().filter(function(s){return cP(s.pagos)<cT(s.parts);}).length;
  var rows=[];
  rows.push(["ESTUDIANTES","",""]);
  rows.push(["Total",gST().length,""]);
  rows.push(["Con deuda",studDeuda,""]);
  rows.push(["Togas entregadas",togasOk+"/"+gST().length,""]);
  rows.push(["","",""]);
  rows.push(["RECAUDACION","",""]);
  rows.push(["Cuotas",fD(tR),"Meta: "+fD(tE)]);
  rows.push(["Rifas",fD(tRifa),""]);
  rows.push(["Subastas",fD(tSub),""]);
  rows.push(["Fondos",fD(tFund),""]);
  rows.push(["Ventas",fD(tVentas),""]);
  rows.push(["TOTAL",fD(tTotal),""]);

function togCompra(id){
  var item=gCO().find(function(x){return x.id===id;});
  if(!item)return;
  if(item.listo){
    // Already done - require password to undo
    confirmarAccion("Desmarcar '"+item.item+"' como pendiente? Solo si fue un error.",function(){
      D.compras=gCO().map(function(i){
        if(i.id!==id)return i;
        return {id:i.id,item:i.item,cant:i.cant,unidad:i.unidad,asignado:i.asignado,categoria:i.categoria,urgente:i.urgente,listo:false,notas:i.notas};
      });
      SD();mCompras();
    });
  } else {
    // Mark as done directly
    D.compras=gCO().map(function(i){
      if(i.id!==id)return i;
      return {id:i.id,item:i.item,cant:i.cant,unidad:i.unidad,asignado:i.asignado,categoria:i.categoria,urgente:i.urgente,listo:true,notas:i.notas};
    });
    SD();addN("✓ "+item.item+" listo");mCompras();
  }
}

function renderAuditLogs(logs){
  if(!logs.length) return '<div style="text-align:center;padding:20px;font-size:13px;color:#555;">Sin registros de auditoria.</div>';
  var html="";
  logs.slice(0,100).forEach(function(l){
    var c=l.rol==="admin"?"#C9A84C":l.rol==="directiva"?"#7C6CD4":l.rol==="maestro"?"#4CA8C9":l.rol==="proveedor"?"#4CC97A":"#C94C7A";
    html+='<div style="background:#12121a;border-left:3px solid '+c+';border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:6px;">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
    html+='<div style="flex:1;">';
    html+='<div style="font-size:13px;color:#ddd;margin-bottom:3px;">'+l.accion+'</div>';
    html+='<div style="font-size:11px;color:'+c+';">👤 '+l.usuario+' · '+l.rol+'</div>';
    html+='</div>';
    html+='<div style="text-align:right;flex-shrink:0;">';

function doSearch(){
  var q=document.getElementById("srch-q")?document.getElementById("srch-q").value.trim().toLowerCase():"";
  if(!q){document.getElementById("srch-res").innerHTML='<div style="color:#555;font-size:13px;text-align:center;">Escribe algo para buscar.</div>';return;}
  var res=[];
  // Students
  gST().forEach(function(s){
    if((s.nombre||"").toLowerCase().indexOf(q)!==-1||(s.carnet||"").toLowerCase().indexOf(q)!==-1||(s.carrera||"").toLowerCase().indexOf(q)!==-1){
      res.push({tipo:"🎓 Estudiante",nombre:s.nombre,detalle:s.carrera+" · "+s.carnet,accion:"go('stud')",color:"#C94C7A"});
    }
  });
  // Providers
  gPR().forEach(function(p){
    if((p.empresa||"").toLowerCase().indexOf(q)!==-1||(p.srv||"").toLowerCase().indexOf(q)!==-1||(p.cont||"").toLowerCase().indexOf(q)!==-1){
      res.push({tipo:"🤝 Proveedor",nombre:p.empresa,detalle:p.srv+" · "+p.cont,accion:"go('prov')",color:"#4CC97A"});
    }
  });
  // Subastas items
  gSU().forEach(function(sub){
    sub.items.forEach(function(it){
      if((it.nombre||"").toLowerCase().indexOf(q)!==-1){
        res.push({tipo:"🔨 Subasta",nombre:it.nombre,detalle:sub.nombre,accion:"go('suba')",color:"#C9A84C"});
      }
    });
  });
  // Rifas
  gRI().forEach(function(r){
    if((r.nombre||"").toLowerCase().indexOf(q)!==-1||(r.premio||"").toLowerCase().indexOf(q)!==-1){
      res.push({tipo:"🎰 Rifa",nombre:r.nombre,detalle:"Premio: "+r.premio,accion:"go('rifa')",color:"#7C6CD4"});
    }
  });
  // Compras
  gCO().forEach(function(c){
    if((c.item||"").toLowerCase().indexOf(q)!==-1||(c.asignado||"").toLowerCase().indexOf(q)!==-1){
      res.push({tipo:"📋 Compra",nombre:c.item,detalle:"Responsable: "+c.asignado,accion:"mTab('compras')",color:"#4CA8C9"});
    }
  });
  // Avisos
  gAN().forEach(function(a){
    if((a.titulo||"").toLowerCase().indexOf(q)!==-1||(a.texto||"").toLowerCase().indexOf(q)!==-1){
      res.push({tipo:"📢 Aviso",nombre:a.titulo,detalle:a.texto.slice(0,60),accion:"mTab('aviso')",color:"#C9A84C"});
    }
  });
  var html="";
  if(!res.length){
    html='<div style="text-align:center;padding:20px;font-size:13px;color:#555;">Sin resultados para "'+q+'"</div>';
  } else {
    html='<div style="font-size:11px;color:#555;margin-bottom:10px;">'+res.length+' resultado(s)</div>';
    res.forEach(function(r){
      html+='<div style="background:#12121a;border-left:3px solid '+r.color+';border-radius:0 10px 10px 0;padding:12px;margin-bottom:8px;cursor:pointer;" onclick="CM();'+r.accion+'">';
      html+='<div style="font-size:10px;color:'+r.color+';letter-spacing:2px;margin-bottom:3px;">'+r.tipo+'</div>';
      html+='<div style="font-size:14px;color:#ddd;margin-bottom:2px;">'+r.nombre+'</div>';
      html+='<div style="font-size:11px;color:#666;">'+r.detalle+'</div>';
      html+='</div>';
    });
  }
  var el=document.getElementById("srch-res");
  if(el) el.innerHTML=html;
}

function mContador(){
  var ic=gIC();
  var gc=gGC();
  var html='<div class="dv"></div>';
  html+='<div class="ct">⏳ Cuenta Regresiva</div>';
  // Parse date from invConfig
  var gradDate=D.gradConfig&&D.gradConfig.fechaEvento?D.gradConfig.fechaEvento:"";
  var dias="—";var horas="—";var minutos="—";
  if(gradDate){
    var now=new Date();
    var evDate=new Date(gradDate+"T"+(D.gradConfig.horaEvento||"00:00"));
    var diff=evDate-now;
    if(diff>0){
      dias=Math.floor(diff/(1000*60*60*24));
      horas=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
      minutos=Math.floor((diff%(1000*60*60))/(1000*60));
    } else if(diff<=0&&diff>-86400000){
      dias="HOY";horas="";minutos="";
    } else {
      dias="Ya paso";horas="";minutos="";
    }
  }
  html+='<div style="background:linear-gradient(135deg,#12121a,#1a1a2e);border:1px solid #C9A84C40;border-radius:16px;padding:24px;text-align:center;margin-bottom:16px;">';
  html+='<div style="font-size:13px;color:#C9A84C;letter-spacing:3px;margin-bottom:12px;">'+gc.nombre.toUpperCase()+'</div>';
  if(gradDate&&dias!=="—"){
    if(dias==="HOY"){
      html+='<div style="font-size:48px;font-weight:bold;color:#4CC97A;margin-bottom:8px;">🎓 HOY</div>';
      html+='<div style="font-size:14px;color:#4CC97A;">Es el gran dia!</div>';
    } else if(dias==="Ya paso"){
      html+='<div style="font-size:36px;font-weight:bold;color:#555;margin-bottom:8px;">✓ Completado</div>';
    } else {
      html+='<div style="display:flex;justify-content:center;gap:16px;margin-bottom:8px;">';
      html+='<div><div style="font-size:42px;font-weight:bold;color:#C9A84C;">'+dias+'</div><div style="font-size:11px;color:#555;letter-spacing:2px;">DIAS</div></div>';
      html+='<div style="font-size:36px;color:#333;padding-top:4px;">:</div>';
      html+='<div><div style="font-size:42px;font-weight:bold;color:#C9A84C;">'+horas+'</div><div style="font-size:11px;color:#555;letter-spacing:2px;">HORAS</div></div>';
      html+='<div style="font-size:36px;color:#333;padding-top:4px;">:</div>';
      html+='<div><div style="font-size:42px;font-weight:bold;color:#C9A84C;">'+minutos+'</div><div style="font-size:11px;color:#555;letter-spacing:2px;">MIN</div></div>';
      html+='</div>';
    }
  } else {
    html+='<div style="font-size:36px;margin-bottom:8px;">📅</div>';
    html+='<div style="font-size:13px;color:#555;">Configura la fecha del evento</div>';
  }
  html+='</div>';
  // Config date
  if(CU&&(CU.role==="admin"||CU.role==="directiva")){
    html+='<div style="background:#0d0d16;border-radius:10px;padding:12px;margin-bottom:14px;">';
    html+='<div style="font-size:11px;color:#555;letter-spacing:2px;margin-bottom:8px;">FECHA Y HORA DEL EVENTO</div>';
    html+='<div class="r2">';
    html+='<input class="inp" id="ev-fecha" type="date" value="'+(D.gradConfig&&D.gradConfig.fechaEvento||"")+'" placeholder="Fecha"/>';
    html+='<input class="inp" id="ev-hora" type="time" value="'+(D.gradConfig&&D.gradConfig.horaEvento||"")+'" placeholder="Hora"/>';
    html+='</div>';
    html+='<button class="btn bs bg" onclick="saveEventDate()">✓ Guardar fecha</button>';
    html+='</div>';
  }
  // Checklist
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
  html+='<div class="ct" style="margin:0;">✅ Checklist del Dia</div>';
  html+='<button class="btn bs" onclick="oAddCheck()">+ Agregar</button>';
  html+='</div>';
  var checks=D.checklist||[];
  var done=checks.filter(function(c){return c.done;}).length;
  if(checks.length){
    html+=pbHTML(done,checks.length,"#4CC97A",10);
    html+='<div style="font-size:12px;color:#4CC97A;text-align:right;margin:4px 0 10px;">'+done+'/'+checks.length+' completado</div>';
  }
  checks.forEach(function(ck){
    html+='<div style="display:flex;align-items:center;gap:10px;padding:10px;background:#12121a;border-radius:8px;margin-bottom:6px;border:1px solid '+(ck.done?"#4CC97A40":"#2a2a3a")+'">';
    html+='<input type="checkbox" data-id="'+ck.id+'" onchange="togCheck(parseInt(this.dataset.id))" '+(ck.done?"checked":"")+' style="width:20px;height:20px;cursor:pointer;"/>';
    html+='<div style="flex:1;"><div style="font-size:13px;color:'+(ck.done?"#555":"#ddd")+';'+(ck.done?"text-decoration:line-through;":"")+'">'+ck.item+'</div>';

    html+='</div>';
    html+='<button data-id="'+ck.id+'" onclick="delCheck(parseInt(this.dataset.id))" style="background:none;border:none;color:#444;cursor:pointer;font-size:16px;">✕</button>';
    html+='</div>';
  });
  if(!checks.length){
    html+='<div style="text-align:center;padding:16px;font-size:13px;color:#555;">Sin items en el checklist</div>';
  }
  sMC(html);
}

function togCheck(id){

  SD();mContador();
}
function delCheck(id){
  D.checklist=(D.checklist||[]).filter(function(c){return c.id!==id;});
  SD();mContador();
}

function checkAutoBackup(){
  try{
    var lastBackup=localStorage.getItem("gm_last_backup");
    var hoy=new Date().toISOString().split("T")[0];
    if(lastBackup===hoy)return;
    var data=JSON.parse(localStorage.getItem("gm3")||"{}");
    delete data._user;
    data.exportadoEn=new Date().toISOString();
    data.version="GradManager2025";
    var json=JSON.stringify(data);
    var backups=[];
    try{backups=JSON.parse(localStorage.getItem("gm_backups")||"[]");}catch(e2){}
    backups.unshift({fecha:hoy,hora:new Date().toTimeString().slice(0,5),data:json});
    if(backups.length>5)backups=backups.slice(0,5);
    localStorage.setItem("gm_backups",JSON.stringify(backups));
    localStorage.setItem("gm_last_backup",hoy);
    addN("💾 Respaldo automatico guardado");
  }catch(e){}
}

function restaurarAutoBackup(idx){
  var backups=[];try{backups=JSON.parse(localStorage.getItem("gm_backups")||"[]");}catch(e){}
  var b=backups[idx];if(!b)return;
  confirmarAccion("Restaurar respaldo del "+b.fecha+"?",function(){
    try{
      var d=JSON.parse(b.data);
      if(d.students)D.students=d.students;if(d.awards)D.awards=d.awards;
      if(d.providers)D.providers=d.providers;if(d.rifas)D.rifas=d.rifas;
      if(d.subastas)D.subastas=d.subastas;if(d.ensayos)D.ensayos=d.ensayos;
      if(d.budget)D.budget=d.budget;if(d.fundraising)D.fundraising=d.fundraising;
      if(d.votaciones)D.votaciones=d.votaciones;if(d.encuestas)D.encuestas=d.encuestas;
      if(d.actas)D.actas=d.actas;if(d.programa)D.programa=d.programa;
      if(d.anuncios)D.anuncios=d.anuncios;if(d.ventas)D.ventas=d.ventas;
      if(d.compras)D.compras=d.compras;if(d.gradConfig)D.gradConfig=d.gradConfig;
      if(d.invConfig)D.invConfig=d.invConfig;if(d.permisos)D.permisos=d.permisos;
      if(d.usuarios)D.usuarios=d.usuarios;if(d.venue)D.venue=d.venue;
      SD();alert("Respaldo restaurado.");go("dash");
    }catch(e){alert("Error: "+e.message);}
  });
}
function descargarAutoBackup(idx){
  var backups=[];try{backups=JSON.parse(localStorage.getItem("gm_backups")||"[]");}catch(e){}
  var b=backups[idx];if(!b)return;
  var blob=new Blob([b.data],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="GradManager_auto_"+b.fecha+".json";
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
}

function masEnviarRecordatorio(){

function checkStorage(){
  try{
    var data=localStorage.getItem("gm3")||"";
    var bytes=new Blob([data]).size;
    var kb=Math.round(bytes/1024);
    var mb=(bytes/1048576).toFixed(2);
    var pct=Math.round((bytes/5242880)*100); // 5MB limit
    window._storageKB=kb;
    window._storagePct=pct;
    // Warn if over 70%
    if(pct>70&&pct<90){
      addN("⚠️ Almacenamiento al "+pct+"%. Exporta un respaldo pronto.");
    } else if(pct>=90){
      addN("🔴 Almacenamiento casi lleno ("+pct+"%). Exporta respaldo AHORA.");
    }
    return {kb:kb,mb:mb,pct:pct};
  }catch(e){return {kb:0,mb:0,pct:0};}
}
function storageBar(){
  var s=checkStorage();
  var col=s.pct>90?"#C94C7A":s.pct>70?"#C9A84C":"#4CC97A";
  var html='<div style="margin-bottom:8px;">';
  html+='<div style="display:flex;justify-content:space-between;font-size:11px;color:#555;margin-bottom:4px;">';
  html+='<span>💾 Almacenamiento usado</span><span style="color:'+col+';">'+s.mb+' MB / 5 MB ('+s.pct+'%)</span></div>';
  html+=pbHTML(s.pct,100,col,6);
  html+='</div>';
  return html;
}

function regVotoDir(btn){

  D.votaciones=gVO().map(function(x){

    nv[key]=op;

function expVotoPDF(vid){

  });

  });

}

  var c=CU?CU.color:"#C9A84C";

  html+='<div class="g3" style="margin-bottom:10px;">';
  html+='<div class="sb" style="border-color:#C9A84C;"><div class="sv" style="color:#C9A84C;font-size:15px;">'+fD(meta)+'</div><div class="sl">Meta</div></div>';

  html+='<div style="font-size:11px;color:'+c+';text-align:right;margin:4px 0 12px;">'+Math.round((rec/Math.max(meta,1))*100)+'%</div>';
  gFU().forEach(function(item){
    var done=item.rec>=item.meta;
    var sc=done?"#4CC97A":item.estado==="activa"?c:"#888";
    html+='<div class="card" style="border-color:'+sc+'40;margin-bottom:10px;">';

    html+='</div><div style="text-align:right;">';
    html+='<div style="font-size:16px;color:'+sc+';font-weight:bold;">'+fD(item.rec)+'</div>';
    html+='<div style="font-size:10px;color:#555;">de '+fD(item.meta)+'</div></div></div>';
    html+=pbHTML(item.rec,item.meta,sc,8);
    html+='<div style="font-size:11px;color:'+sc+';text-align:right;margin:3px 0 8px;">'+Math.round((item.rec/Math.max(item.meta,1))*100)+'%</div>';

      html+='<div style="margin-bottom:8px;">';
      item.aportes.slice(-2).forEach(function(a){
        html+='<div style="display:flex;justify-content:space-between;font-size:12px;color:#aaa;padding:4px 0;border-bottom:1px solid #1e1e28;">';

  });

// Returns true if student has pending balance
function tieneSaldo(sid){
  var s=gST().find(function(x){return x.id===sid;});
  if(!s)return false;
  return cP(s.pagos)<cT(s.parts);
}
function alertSaldo(nombre){
  alert("⚠ "+nombre+" tiene cuotas pendientes. Debe estar al dia para recibir entregas.");
}
function togToga(sid){
  var s=gST().find(function(x){return x.id===sid;});
  if(!s)return;
  var yaEntregada=(s.toga&&s.toga.ok);
  if(yaEntregada){
    // Already delivered - require password to undo
    confirmarAccion("Desmarcar la toga de "+s.nombre+" como entregada? Solo hazlo si fue un error.",function(){
      D.students=gST().map(function(x){
        if(x.id!==sid)return x;
        return {id:x.id,nombre:x.nombre,carnet:x.carnet,carrera:x.carrera,tel:x.tel,
          email:x.email,gpa:x.gpa,parts:x.parts,pagos:x.pagos,
          toga:{talla:x.toga?x.toga.talla:"M",ok:false},
          qr:x.qr,asis:x.asis};
      });
      SD();addN("👘 Toga de "+s.nombre+" desmarcada");mToga();
    });
    return;
  }
  // Not delivered yet - check balance first
  if(tieneSaldo(sid)){alertSaldo(s.nombre);return;}
  D.students=gST().map(function(x){
    if(x.id!==sid)return x;
    return {id:x.id,nombre:x.nombre,carnet:x.carnet,carrera:x.carrera,tel:x.tel,
      email:x.email,gpa:x.gpa,parts:x.parts,pagos:x.pagos,
      toga:{talla:x.toga?x.toga.talla:"M",ok:true},
      qr:x.qr,asis:x.asis};
  });
  SD();addN("👘 Toga entregada: "+s.nombre);mToga();
}
function expTogPDF(){exportPDF("Control de Togas",["Nombre","Carnet","Talla","Entregada"],gST().map(s=>[s.nombre,s.carnet,(s.toga?s.toga.talla:"—")||"—",(s.toga&&s.toga.ok)?"Si":"No"]));}

      var unread=D.mensajes.filter(function(m){return m.from===u.id&&m.to===CU.id&&!m.read;}).length;
      var last=msgs.length?msgs[msgs.length-1]:null;
      html+='<div style="background:#12121a;border:1px solid '+(unread?"#C9A84C40":"#2a2a3a")+';border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;" data-uid="'+u.id+'" onclick="openChat(parseInt(this.dataset.uid))">';
      html+='<div style="width:40px;height:40px;border-radius:50%;background:'+u.color+'20;border:2px solid '+u.color+'60;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:'+u.color+';flex-shrink:0;">'+u.av+'</div>';
      html+='<div style="flex:1;">';
      html+='<div style="font-size:14px;color:#ddd;">'+u.name+'</div>';
      html+='<div style="font-size:11px;color:#555;">'+u.role+(last?" · "+last.txt.slice(0,30):"")+'</div>';
      html+='</div>';
      if(unread) html+='<div style="background:#C9A84C;color:#000;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;">'+unread+'</div>';
      html+='</div>';
    });
  } else {
    // Show conversation
    var otherUser=todos.find(function(u){return u.id===window._chatWith;});
    if(!otherUser){window._chatWith=null;mChat();return;}
    html+='<button class="btn bs" style="margin-bottom:12px;" onclick="window._chatWith=null;mChat()">← Volver</button>';
    html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px;background:#12121a;border-radius:10px;">';
    html+='<div style="width:36px;height:36px;border-radius:50%;background:'+otherUser.color+'20;border:2px solid '+otherUser.color+'60;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:'+otherUser.color+';">'+otherUser.av+'</div>';
    html+='<div><div style="font-size:14px;color:#ddd;">'+otherUser.name+'</div><div style="font-size:11px;color:'+otherUser.color+';">'+otherUser.role+'</div></div></div>';
    // Messages
    var convMsgs=D.mensajes.filter(function(m){return (m.from===CU.id&&m.to===window._chatWith)||(m.from===window._chatWith&&m.to===CU.id);});
    // Mark as read
    D.mensajes=D.mensajes.map(function(m){
      if(m.from===window._chatWith&&m.to===CU.id) return {id:m.id,from:m.from,to:m.to,txt:m.txt,fecha:m.fecha,hora:m.hora,read:true};
      return m;
    });
    SD();
    html+='<div style="min-height:200px;margin-bottom:12px;">';
    if(!convMsgs.length){
      html+='<div style="text-align:center;padding:30px;font-size:13px;color:#555;">Inicia la conversacion</div>';
    }
    convMsgs.forEach(function(m){
      var isMe=m.from===CU.id;
      html+='<div style="display:flex;justify-content:'+(isMe?"flex-end":"flex-start")+';margin-bottom:8px;">';
      html+='<div style="max-width:75%;background:'+(isMe?c+"20":"#1e1e28")+';border:1px solid '+(isMe?c+"40":"#2a2a3a")+';border-radius:'+(isMe?"12px 12px 0 12px":"12px 12px 12px 0")+';padding:10px 12px;">';
      html+='<div style="font-size:13px;color:#ddd;margin-bottom:4px;">'+m.txt+'</div>';
      html+='<div style="font-size:10px;color:#555;text-align:'+(isMe?"right":"left")+';">'+m.hora+' · '+m.fecha+'</div>';
      html+='</div></div>';
    });
    html+='</div>';
    // Input
    html+='<div style="display:flex;gap:8px;">';
    html+='<input class="inp" id="chat-msg" placeholder="Escribe un mensaje..." style="flex:1;margin:0;"/>';
    html+='<button class="btn bs bg" onclick="sendChatMsg()">➤</button>';
    html+='</div>';
  }
  sMC(html);
}
function openChat(uid){
  window._chatWith=uid;mChat();
}
function sendChatMsg(){
  var txt=document.getElementById("chat-msg")?document.getElementById("chat-msg").value.trim():"";
  if(!txt)return;
  if(!D.mensajes)D.mensajes=[];
  D.mensajes.push({id:Date.now(),from:CU.id,to:window._chatWith,txt:txt,fecha:tod(),hora:nowT(),read:false});
  SD();addN("💬 Mensaje a "+getUsuarios().find(function(u){return u.id===window._chatWith;}).name);
  mChat();
}

function mAI(){
  const c=CU?CU.color:"#C9A84C";
  const tR=gST().reduce((s,st)=>s+cP(st.pagos),0);const tE=gST().reduce((s,st)=>s+cT(st.parts),0);
  sMC(`<div class="dv"></div><div class="ct">✧ Reporte IA</div>
    <div class="card">
      <div style="font-size:14px;color:#ddd;margin-bottom:6px;">Reporte Ejecutivo Inteligente</div>
      <div style="font-size:12px;color:#555;margin-bottom:14px;">Analiza todos los modulos en tiempo real</div>
      <div class="g2" style="margin-bottom:14px;">
        <div class="sb"><div class="sv" style="color:${c};font-size:16px;">${Math.round((tR/Math.max(tE,1))*100)}%</div><div class="sl">Cuotas</div></div>
        <div class="sb"><div class="sv" style="color:#C94C7A;font-size:16px;">${fQ(gRI().reduce((s,r)=>s+r.rec,0))}</div><div class="sl">Rifas</div></div>
        <div class="sb"><div class="sv" style="color:#7C6CD4;font-size:16px;">${gSU().length}</div><div class="sl">Subastas</div></div>
        <div class="sb"><div class="sv" style="color:#FFD700;font-size:16px;">${gAW().filter(a=>a.ok).length}</div><div class="sl">Premios</div></div>
      </div>
      <button class="btn bw" id="ai-btn" onclick="genAI()" style="border-color:${c};background:${c}20;color:${c};">✦ Generar Reporte con IA</button>
      <div id="ai-res" style="margin-top:14px;"></div>
    </div>`);
}
async function genAI(){
  const btn=document.getElementById("ai-btn");const res=document.getElementById("ai-res");if(!btn||!res)return;
  btn.textContent="⏳ Analizando...";btn.disabled=true;
  const tR=gST().reduce((s,st)=>s+cP(st.pagos),0);const tE=gST().reduce((s,st)=>s+cT(st.parts),0);
  const tRifa=gRI().reduce((s,r)=>s+r.rec,0);const tFund=gFU().reduce((s,i)=>s+i.rec,0);
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Reporte ejecutivo breve en espanol para directiva de graduacion 2025:
ESTUDIANTES: ${gST().length} registrados. Cuotas: ${fD(tR)} de ${fD(tE)} (${Math.round((tR/Math.max(tE,1))*100)}%).
RECONOCIMIENTOS: ${gAW().length} asignados, ${gAW().filter(a=>a.ok).length} aprobados.
RIFAS: ${gRI().length} rifas, ${fQ(tRifa)} recaudado.
SUBASTAS: ${gSU().length} subastas.
RECAUDACION: ${fD(tFund)} en actividades de fondos.
PROVEEDORES: ${gPR().filter(p=>p.estado==="contratado").length} contratados de ${gPR().length}.
PRESUPUESTO: Total ${fD(gBU().reduce((s,b)=>s+b.pres,0))}, Gastado ${fD(gBU().reduce((s,b)=>s+b.gast,0))}.
Incluye: Resumen, Finanzas, Alertas, Recomendaciones. Max 250 palabras. Emojis.`}]})});
    const d=await r.json();
    if((d.content&&d.content[0]&&d.content[0].text)){res.innerHTML=`<div style="background:#0d0d16;border-radius:8px;padding:14px;border:1px solid #C9A84C30;"><div style="font-size:10px;letter-spacing:2px;color:#C9A84C;margin-bottom:10px;">REPORTE GENERADO</div><div style="font-size:13px;color:#ccc;line-height:1.8;white-space:pre-wrap;">${d.content[0].text}</div></div>`;}
    else res.innerHTML=`<div style="color:#C94C7A;font-size:13px;">Error al generar el reporte.</div>`;
  }catch(e){res.innerHTML=`<div style="color:#C94C7A;font-size:13px;">Error de conexion con la IA.</div>`;}
  btn.textContent="✦ Generar de nuevo";btn.disabled=false;
}
